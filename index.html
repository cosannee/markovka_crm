<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Марковка</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f7f7e4;--bg2:#eeedc8;--bg3:#e5e4b0;--card:#ffffff;
  --accent:#635535;--accent2:#8a7a50;--accent-bg:#f0efb1;
  --text1:#3a3020;--text2:#635535;--text3:#b0a882;
  --border:#e8e6cc;--border2:#d8d5b0;
  --green:#2a7a45;--green-bg:#d9f0e3;
  --blue:#3a8fa3;--blue-bg:#daeef5;
  --red:#6e2222;--red-bg:#f5dada;
  --orange:#8a7a30;--orange-bg:#f0efb1;
  --purple:#6b52a0;--purple-bg:#f2eefa;
  --gray:#7a7570;--gray-bg:#f5f2ef;
  --r:10px;--r2:16px;
  --sh:0 1px 8px rgba(60,48,32,.06);
  --sh2:0 4px 20px rgba(60,48,32,.10);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text1);font-size:14px;min-height:100vh;overflow-x:hidden}
.stripe-bar{height:14px;background:repeating-linear-gradient(90deg,#a3cdd9 0,#a3cdd9 28px,#f7f7e4 28px,#f7f7e4 56px)}
#login{min-height:90vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-wrap{width:100%;max-width:340px;padding:32px 20px 20px}
.login-sub{text-align:center;font-size:13px;color:var(--text3);margin-bottom:28px}
#app{display:none;flex-direction:column;min-height:100vh}
.app-header{background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--sh)}
.h-logo{font-family:'Playfair Display',serif;font-style:italic;font-size:19px;color:var(--accent)}
.h-role{font-size:11px;color:#fff;background:var(--blue);padding:3px 10px;border-radius:20px;font-weight:700}
.h-right{display:flex;align-items:center;gap:8px}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:6px;border-radius:8px;line-height:1}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:0;padding:11px 4px;border:none;background:none;font-family:'Nunito',sans-serif;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.main{padding:14px;flex:1;max-width:600px;width:100%;margin:0 auto}
.card{background:var(--card);border-radius:var(--r2);border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden}
.card+.card{margin-top:10px}
.card.urgent{border-left:3px solid var(--red)}
.card-head{padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-num{font-family:'Playfair Display',serif;font-size:14px;color:var(--accent);font-weight:600}
.card-name{font-size:14px;font-weight:600;color:var(--text1);margin-top:1px}
.card-body{padding:10px 14px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cf{display:flex;flex-direction:column;gap:1px}
.cf-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.cf-v{font-size:13px;color:var(--text1);font-weight:500}
.card-foot{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.card-comment{font-size:11px;color:var(--text3);font-style:italic;flex:1}
.badge{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;letter-spacing:.2px}
.b-new{background:#daeef5;color:#3a8fa3}
.b-work{background:#f0efb1;color:#8a7a30}
.b-ready{background:#d9f0e3;color:#2a7a45}
.b-sent{background:#ece8f8;color:#6b52a0}
.b-done{background:#f0f0ec;color:#7a7570}
.b-urgent{background:#f5dada;color:#6e2222}
.b-paid{background:#d9f0e3;color:#2a7a45}
.b-part{background:#f0efb1;color:#8a7a30}
.b-sdek{background:#daeef5;color:#3a8fa3}
.b-inst{background:#fce8f0;color:#b0366a}
.b-wait{background:#daeef5;color:#3a8fa3}
.b-pers{background:#ece8f8;color:#6b52a0}
.b-site{background:#daeef5;color:#3a8fa3}
.b-advance{background:#fff3cd;color:#856404}
.b-postpay{background:#d1ecf1;color:#0c5460}
.st-select{padding:6px 10px;border-radius:8px;border:1px solid var(--border2);font-family:'Nunito',sans-serif;font-size:12px;background:var(--bg);color:var(--text1);cursor:pointer;outline:none}
.btn{padding:9px 18px;border-radius:var(--r);border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--bg2);color:var(--text2);border:1px solid var(--border2)}
.btn-sm{padding:5px 11px;font-size:11px}
.btn-full{width:100%;justify-content:center}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text3)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #f0c0c0}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid #b0dcc0}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--card);font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.search-inp{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--card);font-family:'Nunito',sans-serif;font-size:13px;color:var(--text1);outline:none;flex:1;min-width:120px}
.search-inp:focus{border-color:var(--accent)}
.form-section{background:var(--card);border-radius:var(--r2);border:1px solid var(--border);padding:16px;box-shadow:var(--sh);margin-bottom:12px}
.form-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--text1);margin-bottom:14px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{padding:9px 12px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg);font-family:'Nunito',sans-serif;font-size:13px;color:var(--text1);outline:none;transition:border-color .15s;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:60px}
/* Убираем стрелки-спиннеры у числовых полей (мешают и меняют значение при прокрутке) */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.span2{grid-column:span 2}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:6px 0}
.checkbox-row input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:var(--r2);padding:14px;border:1px solid var(--border);box-shadow:var(--sh)}
.stat-val{font-family:'Playfair Display',serif;font-size:24px;color:var(--accent);font-weight:600}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px}
.alert{padding:10px 12px;border-radius:var(--r);font-size:12px;margin-bottom:8px}
.alert-red{background:var(--red-bg);color:var(--red)}
.alert-orange{background:var(--orange-bg);color:var(--orange)}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.cal-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--text1)}
.cal-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:5px 12px;font-size:14px;cursor:pointer;color:var(--text2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dh{text-align:center;padding:7px 2px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;background:var(--bg2);border-bottom:1px solid var(--border)}
.cal-cell{min-height:60px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:3px;position:relative}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.other{background:var(--bg2)}
.cal-cell.today{background:var(--accent-bg)}
.cal-dn{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:2px}
.cal-cell.today .cal-dn{color:var(--accent)}
.cal-dot{display:block;font-size:9px;padding:1px 4px;border-radius:3px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;font-weight:600}
.cal-month-orders{padding:12px 14px;border-top:1px solid var(--border)}
.cal-mo-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.cal-mo-num{font-weight:700;color:var(--accent);min-width:46px}
.cal-mo-toy{color:var(--text2);flex:1}
.modal-bg{position:fixed;inset:0;background:rgba(30,23,16,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Playfair Display',serif;font-size:17px;margin-bottom:16px}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text1);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:8px}
.section-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;margin-top:4px}
.pay-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;gap:8px}
.week-chip{display:inline-block;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:700;background:var(--blue-bg);color:var(--blue);margin-bottom:3px}
.chip-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}
@media(max-width:400px){.form-grid{grid-template-columns:1fr}.span2{grid-column:span 1}}
.drop-item{padding:7px 10px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--text1);display:flex;align-items:center;gap:6px}
.drop-item:hover{background:var(--bg2)}
.drop-active{background:var(--accent-bg);color:var(--accent);font-weight:600}

.note-item{background:var(--accent-bg);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:12px}
.note-author{font-weight:700;color:var(--accent);margin-right:4px}
.note-date{color:var(--text3);font-size:11px}
.note-text{color:var(--text1);margin-top:2px}
</style>
</head>
<body>

<div class="stripe-bar"></div>
<div id="login">
  <div class="login-wrap">
    <div style="font-family:'Playfair Display',serif;font-style:italic;font-size:42px;color:#635535;text-align:center;margin-bottom:6px">Марковка</div>
    <div style="font-family:'Playfair Display',serif;font-size:26px;color:#635535;text-align:center;margin-bottom:4px"></div>
    <div class="login-sub" style="text-align:center;color:var(--text3);font-size:13px;margin-bottom:28px">новорождённая игрушка</div>
    <div class="fg">
      <label>Пароль</label>
      <input id="login-pass" type="password" placeholder="Введите пароль..." autocomplete="current-password"
        style="font-size:16px;padding:12px 16px"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary btn-full" style="margin-top:4px;padding:13px" onclick="doLogin()">Войти</button>
    <div id="login-error" style="display:none;background:#f5dada;color:#6e2222;border-radius:12px;padding:12px;text-align:center;font-size:13px;margin-top:12px"></div>
  </div>
</div>

<div id="app">
  <div class="stripe-bar"></div>
  <div class="app-header">
    <div class="h-logo">Марковка</div>
    <div class="h-right">
      <span><span class="sync-dot"></span></span>
      <span id="h-user-name" style="font-size:11px;color:var(--text2);font-weight:700"></span>
      <div class="h-role" id="h-role-lbl"></div>
      <div id="h-preview-badge" style="display:none;background:#f5dada;color:#6e2222;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px"></div>
      <button id="btn-switch-role" class="btn-icon" style="display:none;font-size:13px;padding:4px 8px;border:1px solid var(--border2);border-radius:8px" onclick="showRoleSwitcher()">👁</button>
      <button class="btn-icon" onclick="logout()">✕</button>
    </div>
  </div>
  <div class="tabs" id="tabs-bar"></div>
  <div class="main" id="main"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const TOY_EMOJI={'Мишка':'🐻','Мышка':'🐭','Зайка':'🐰','Котик':'🐱'};
function toyEmoji(type){return TOY_EMOJI[type]||'🧸';}
function calcMatCost(o){
  // Себестоимость = сумма по всем игрушкам заказа (Даша 250 руб/кг, Света 400 руб/кг)
  // Архивные заказы могут хранить свою ставку o.varRate (₽/г).
  var rate=(typeof o.varRate==='number'&&o.varRate>0)?o.varRate:null;
  return getItems(o).reduce(function(s,it){return s+calcItemMat(it,o.master,rate);},0);
}
function calcMargin(o){
  var price=orderTotal(o);
  if(!price)return null;
  var c=calcCosts(o);
  return c.profit;
}
const STATUSES={
  new:{label:'Новый',cls:'b-new'},
  nextweek:{label:'След. неделя',cls:'b-sdek'},
  work:{label:'В работе',cls:'b-work'},
  ready:{label:'Готов',cls:'b-ready'},
  planned:{label:'Отправка планируется',cls:'b-sdek'},
  sent:{label:'Отправлен',cls:'b-sent'},
  done:{label:'Доставлен',cls:'b-done'},
  archived:{label:'Архив',cls:'b-gray'},
};
const SOURCES={
  waiting:{label:'Лист ожидания',cls:'b-wait'},
  instagram:{label:'Instagram',cls:'b-inst'},
  personal:{label:'Личный',cls:'b-pers'},
  site:{label:'Сайт',cls:'b-site'},
};
const MASTERS=['Даша','Света'];

const ROLE_MAP={
  '461599258': {role:'manager', name:'Александра', label:'COO',    masterName:null},
  '5158981366':{role:'director',name:'Даша',       label:'Руководитель',masterName:null},
  '5273106995':{role:'master',  name:'Света',      label:'Мастер',      masterName:'Света'},
};
const PASSWORDS={
  'sasha2024':   {role:'manager', name:'Александра', label:'COO',    masterName:null},
  'dasha2024':   {role:'director',name:'Даша',       label:'Руководитель',masterName:null},
  'sveta2024':   {role:'master',  name:'Света',      label:'Мастер',      masterName:'Света'},
};
let role=null,masterName=null,tab='list',myTodos=[],fStatus='all',fMonth='all',fMaster='all',fUrgent=false,fSort='date',search='',calDate=new Date(),showArchive=false;
const VALID_SORTS=['date','date_asc','deadline','margin'];
let expandedCards=new Set();
let realRole=null,isPreviewMode=false;
let orders=[],tasks=[];
let cloudOrderCount=0;  // сколько заказов мы считаем в облаке (для стража массового стирания)

const OPENROUTER_PROXY='https://openrouter-proxy.zaytsevalexandara.workers.dev';

// ── СТАРОЕ ХРАНИЛИЩЕ JsonBin (оставлено только для разовой миграции) ──
const JSONBIN_ID='6a31904fda38895dfecb54fe';
const JSONBIN_KEY='$2a$10$yDV194UbfbUV7DC2XUUd4OHjsLq37DiuNiZKGjUAwWcGjoz3Z3aXO';
const JSONBIN_URL='https://api.jsonbin.io/v3/b/'+JSONBIN_ID;

// ── SUPABASE (основное хранилище) ──
// Запись идёт по отдельным строкам (заказам/задачам), поэтому правки разных
// людей не затирают друг друга — в отличие от JsonBin, где писался весь файл целиком.
const SB_URL='https://xcthayifpkqfjwdvvcvh.supabase.co';
const SB_KEY='sb_publishable_iLKu1GyvYIpLIwEnLlLIXg_uVHbuLhT';
function sbHeaders(){return {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};}
// Снимок последнего синхронизированного состояния (id -> JSON) для диффа при сохранении
let _sbSnap={orders:{},tasks:{}};
function sbBuildSnap(arr){var m={};(arr||[]).forEach(function(it){if(it&&it.id)m[it.id]=JSON.stringify(it);});return m;}

// ── Параметры синхронизации ──
const SYNC_INTERVAL=30000;   // интервал автосинхронизации, мс (30 сек)
const IDLE_LIMIT=180000;     // после 3 мин без действий опрос приостанавливается
let lastSyncTime=0;          // время последней успешной синхронизации с JsonBin
let syncInProgress=false;    // защита от одновременных запросов чтения
let cloudLoadOk=false;       // удалось ли хоть раз успешно прочитать облако в этой сессии
let lastActivity=Date.now(); // время последнего действия пользователя
let activityBound=false;     // навешены ли слушатели активности

// Чтение локального кэша
function readCache(){
  try{const d=localStorage.getItem('markovka_data');return d?JSON.parse(d):null;}catch(e){return null;}
}

async function loadData(force){
  // Если данные загружены меньше SYNC_INTERVAL назад — используем локальную копию
  if(!force&&lastSyncTime&&(Date.now()-lastSyncTime)<SYNC_INTERVAL){
    return readCache();
  }
  // Защита от дублирующихся одновременных запросов
  if(syncInProgress)return readCache();
  syncInProgress=true;
  try{
    console.log("Supabase sync");
    const ord=await sbSelectTable('orders');
    const tsk=await sbSelectTable('tasks');
    // Сортируем по дате создания (новые сверху) — порядок в БД произвольный
    ord.sort(function(a,b){return (b.created||0)-(a.created||0);});
    tsk.sort(function(a,b){return (b.created||0)-(a.created||0);});
    const data={orders:ord,tasks:tsk};
    lastSyncTime=Date.now();
    cloudLoadOk=true;                       // облако успешно прочитано
    cloudOrderCount=ord.length;
    _sbSnap.orders=sbBuildSnap(ord);
    _sbSnap.tasks=sbBuildSnap(tsk);
    try{localStorage.setItem('markovka_data',JSON.stringify(data));}catch(e){}
    return data;
  }catch(e){
    // ВАЖНО: не выставляем cloudLoadOk — облако недоступно, запись будет заблокирована
    console.warn('Облако недоступно, работаем с локальной копией',e);
    return readCache();
  }finally{
    syncInProgress=false;
  }
}
// Чтение одной таблицы Supabase → массив объектов (data-поле каждой строки)
async function sbSelectTable(table){
  const r=await fetch(SB_URL+'/rest/v1/'+table+'?select=id,data',{headers:sbHeaders()});
  if(!r.ok)throw new Error('select '+table+' '+r.status);
  const rows=await r.json();
  return rows.map(function(row){return row.data;}).filter(Boolean);
}
// Локальные резервные копии: храним 5 последних снимков данных в localStorage.
// Позволяет откатиться, если данные случайно повредились/стёрлись.
function pushBackup(payload){
  try{
    var arr=JSON.parse(localStorage.getItem('markovka_backups')||'[]');

async function saveData(ords,tsks,skipGuard){
  // ЗАЩИТА ОТ ПОТЕРИ ДАННЫХ: не пишем в облако, пока ни разу его не прочитали.
  // Иначе пустой/тестовый локальный набор может затереть реальные данные в JsonBin.
  if(!cloudLoadOk){
    console.warn('Запись в облако заблокирована: облако ещё не было загружено в этой сессии');
    try{localStorage.setItem('markovka_data',JSON.stringify({orders:ords,tasks:tsks}));}catch(e){}
    toast('⚠️ Нет связи с облаком — изменения сохранены только локально');
    return;
  }
  // СТРАЖ МАССОВОГО СТИРАНИЯ: лишний запрос-чтение делаем ТОЛЬКО когда заказов
  // становится меньше, чем мы знаем по облаку (реальный риск потери). При обычных
  // правках/смене статуса/добавлении заказов чтения нет — сохранение быстрое.
  if(!skipGuard && Array.isArray(ords) && ords.length<cloudOrderCount && cloudOrderCount>=5){
    try{
      const cloud=await sbSelectTable('orders');
      const cloudN=cloud.length;
      const newN=Array.isArray(ords)?ords.length:0;
      if(cloudN>=5 && newN<cloudN-1){
        const lost=cloudN-newN;
        if(!confirm('⚠️ ВНИМАНИЕ: в облаке '+cloudN+' заказов, а сохраняется '+newN+' (исчезает '+lost+').\n\nЭто похоже на случайную потерю данных. Сохранить ВСЁ РАВНО?')){
          // Откатываем локальное состояние к облаку, чтобы не терять реальные данные
          cloud.sort(function(a,b){return (b.created||0)-(a.created||0);});
          orders=cloud;cloudOrderCount=orders.length;
          _sbSnap.orders=sbBuildSnap(cloud);
          try{localStorage.setItem('markovka_data',JSON.stringify({orders:orders,tasks:tasks}));}catch(e){}
          renderTabs();renderTab(tab);
          toast('Сохранение отменено — данные из облака восстановлены');
          return;
        }
      }
    }catch(e){/* если страж не смог прочитать облако — не блокируем, чтобы не терять правки */}
  }
  const payload={orders:ords,tasks:tsks};
  pushBackup(payload);  // снимок перед записью
  // Локальная копия считается свежей сразу после сохранения — повторное чтение не требуется
  try{localStorage.setItem('markovka_data',JSON.stringify(payload));lastSyncTime=Date.now();}catch(e){}
  try{
    console.log("Supabase sync");
    await sbSyncTable('orders',ords);
    await sbSyncTable('tasks',tsks);
    cloudOrderCount=Array.isArray(ords)?ords.length:cloudOrderCount;  // облако теперь содержит столько заказов
  }catch(e){console.warn('save error',e);toast('⚠️ Не удалось сохранить в облако');}
}
// Дифф-синхронизация одной таблицы: пишем только изменённые/новые строки и удаляем исчезнувшие.
// Благодаря этому правки разных людей по разным заказам не затирают друг друга.
async function sbSyncTable(table,arr){
  arr=Array.isArray(arr)?arr:[];
  const snap=_sbSnap[table]||{};
  const cur={},toUpsert=[];
  arr.forEach(function(it){
    if(!it||!it.id)return;
    const js=JSON.stringify(it);
    cur[it.id]=js;
    if(snap[it.id]!==js)toUpsert.push({id:it.id,data:it});
  });
  const toDelete=Object.keys(snap).filter(function(id){return !(id in cur);});
  if(toUpsert.length){
    const r=await fetch(SB_URL+'/rest/v1/'+table,{
      method:'POST',
      headers:Object.assign({},sbHeaders(),{'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'}),
      body:JSON.stringify(toUpsert)
    });
    if(!r.ok)throw new Error('upsert '+table+' '+r.status);
  }
  if(toDelete.length){
    const list=toDelete.map(function(id){return '"'+id+'"';}).join(',');
    const r=await fetch(SB_URL+'/rest/v1/'+table+'?id=in.('+encodeURIComponent(list)+')',{
      method:'DELETE',
      headers:Object.assign({},sbHeaders(),{'Prefer':'return=minimal'})
    });
    if(!r.ok)throw new Error('delete '+table+' '+r.status);
  }
  _sbSnap[table]=cur;
}

// ── РАЗОВАЯ МИГРАЦИЯ JsonBin → Supabase ──
// Вызывается один раз из консоли браузера: migrateFromJsonBin()
async function migrateFromJsonBin(){
  try{
    const r=await fetch(JSONBIN_URL+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY,'X-Bin-Meta':'false'}});
    if(!r.ok)throw new Error('JsonBin '+r.status);
    const data=await r.json();
    const o=Array.isArray(data.orders)?data.orders:[];
    const t=Array.isArray(data.tasks)?data.tasks:[];
    if(!confirm('Перенести в Supabase: '+o.length+' заказов и '+t.length+' задач?\nСуществующие строки с такими же id будут обновлены.'))return;
    // Гарантируем id у каждой записи
    o.forEach(function(x){if(!x.id)x.id=uid();});
    t.forEach(function(x){if(!x.id)x.id=uid();});
    const upsert=async function(table,arr){
      if(!arr.length)return;
      const res=await fetch(SB_URL+'/rest/v1/'+table,{
        method:'POST',
        headers:Object.assign({},sbHeaders(),{'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'}),
        body:JSON.stringify(arr.map(function(x){return {id:x.id,data:x};}))
      });
      if(!res.ok)throw new Error('upsert '+table+' '+res.status);
    };
    await upsert('orders',o);
    await upsert('tasks',t);
    alert('✅ Миграция завершена: '+o.length+' заказов, '+t.length+' задач перенесены в Supabase.');
    location.reload();
  }catch(e){alert('Ошибка миграции: '+e.message);console.error(e);}
}

function uid(){return '_'+Math.random().toString(36).substr(2,9)}

// Instagram: \u043d\u0438\u043a \u0438\u043b\u0438 \u0441\u0441\u044b\u043b\u043a\u0430 -> {url, handle}
function igInfo(raw){
  var s=(raw||'').trim();
  if(!s)return null;
  var url,handle;
  if(/^https?:\/\//i.test(s)){
    url=s;
    var m=s.replace(/\/+$/,'').match(/instagram\.com\/([^\/?#]+)/i);
    handle=m?'@'+m[1]:s.replace(/^https?:\/\//i,'');
  } else {
    var nick=s.replace(/^@/,'').replace(/\/+$/,'');
    url='https://instagram.com/'+nick;
    handle='@'+nick;
  }
  return {url:url,handle:handle};
}

// \u2500\u2500 \u0418\u0413\u0420\u0423\u0428\u041a\u0418 \u0412 \u0417\u0410\u041a\u0410\u0417\u0415 (\u043c\u0443\u043b\u044c\u0442\u0438\u043f\u043e\u0437\u0438\u0446\u0438\u043e\u043d\u043d\u043e\u0441\u0442\u044c) \u2500\u2500
// \u0421\u0442\u0430\u0440\u044b\u0435 \u0437\u0430\u043a\u0430\u0437\u044b (\u0431\u0435\u0437 items) \u0447\u0438\u0442\u0430\u044e\u0442\u0441\u044f \u043a\u0430\u043a \u043e\u0434\u043d\u0430 \u0438\u0433\u0440\u0443\u0448\u043a\u0430 \u0438\u0437 \u043f\u043b\u043e\u0441\u043a\u0438\u0445 \u043f\u043e\u043b\u0435\u0439.
function getItems(o){
  if(o&&Array.isArray(o.items)&&o.items.length)return o.items;
  return [{
    toyType:(o&&(o.toyType||o.toys))||'',
    weightG:parseFloat(o&&(o.weightG||o.weight))||0,
    heightCm:parseFloat(o&&(o.heightCm||o.height))||0,
    embCount:parseInt(o&&o.embCount)||0,
    embText:(o&&o.embText)||'',
    price:parseFloat(o&&o.price)||0,
    gender:(o&&o.gender)||'',
    clothes:(o&&o.clothes)||'',
    count:parseInt(o&&o.count)||1
  }];
}
function orderTotal(o){return getItems(o).reduce(function(s,it){return s+(parseFloat(it.price)||0)*(parseInt(it.count)||1);},0);}
function orderWeight(o){return getItems(o).reduce(function(s,it){return s+(parseFloat(it.weightG)||0)*(parseInt(it.count)||1);},0);}
function orderEmbCount(o){return getItems(o).reduce(function(s,it){return s+(parseInt(it.embCount)||0)*(parseInt(it.count)||1);},0);}
function orderQty(o){return getItems(o).reduce(function(s,it){return s+(parseInt(it.count)||1);},0);}
function orderToyLabel(o){
  var items=getItems(o);
  var parts=items.map(function(it){var c=(parseInt(it.count)||1);return(it.toyType||'\u0438\u0433\u0440\u0443\u0448\u043a\u0430')+(c>1?' \u00d7'+c:'');});
  return parts.filter(Boolean).join(' + ');
}
// \u0417\u0430\u043a\u0440\u044b\u0442 \u043b\u0438 \u0437\u0430\u043a\u0430\u0437 (\u043a\u043b\u0438\u0435\u043d\u0442 \u043f\u043e\u043b\u043d\u043e\u0441\u0442\u044c\u044e \u043e\u043f\u043b\u0430\u0442\u0438\u043b). \u042f\u0432\u043d\u044b\u0439 \u0444\u043b\u0430\u0433 closed \u0438\u043c\u0435\u0435\u0442 \u043f\u0440\u0438\u043e\u0440\u0438\u0442\u0435\u0442;
// \u0434\u043b\u044f \u0441\u0442\u0430\u0440\u044b\u0445 \u0437\u0430\u043a\u0430\u0437\u043e\u0432 \u0431\u0435\u0437 \u0444\u043b\u0430\u0433\u0430 \u2014 \u043e\u043f\u0440\u0435\u0434\u0435\u043b\u044f\u0435\u043c \u043f\u043e \u0441\u0442\u0430\u0442\u0443\u0441\u0443+\u043f\u043e\u043b\u043d\u043e\u0439 \u043e\u043f\u043b\u0430\u0442\u0435.
function isClosed(o){
  if(typeof o.closed==='boolean')return o.closed;
  var tot=orderTotal(o);
  return (o.status==='done'||o.status==='sent') && tot>0 && (parseFloat(o.prepaid)||0)>=tot;

function calcItemMat(item,master,rate){
  var varPerG=(typeof rate==='number'&&rate>0)?rate:(master==='\u0421\u0432\u0435\u0442\u0430'?0.40:0.25);
  var cnt=parseInt(item.count)||1;
  return (700+(parseFloat(item.weightG)||0)*varPerG)*cnt;
}
// \u0417\u041f \u043c\u0430\u0441\u0442\u0435\u0440\u0430 \u0437\u0430 \u043e\u0434\u043d\u0443 \u043f\u043e\u0437\u0438\u0446\u0438\u044e (\u0441 \u0443\u0447\u0451\u0442\u043e\u043c \u043a\u043e\u043b-\u0432\u0430)
function calcItemMasterPay(item,master){
  var cnt=parseInt(item.count)||1;
  if(master==='\u0421\u0432\u0435\u0442\u0430')return calcZpSveta(item.weightG,item.embCount)*cnt;
  if(master==='\u0414\u0430\u0448\u0430')return calcZpDarya(item.weightG,item.embCount)*cnt;
  return (2500+(parseInt(item.embCount)||0)*400)*cnt;
}

  // 1) Сначала показываем данные из локального кэша (быстрое открытие)
  const cached=readCache();
  if(cached&&Array.isArray(cached.orders)){
    orders=cached.orders;
    tasks=Array.isArray(cached.tasks)?cached.tasks:[];
    renderTabs();renderTab(tab);
  }
  // 2) Затем загружаем актуальные данные из JsonBin
  const data=await loadData(true);
  if(cloudLoadOk&&data&&Array.isArray(data.orders)){
    // Облако прочитано успешно и в нём есть заказы — используем их
    orders=data.orders;
    tasks=Array.isArray(data.tasks)?data.tasks:[];
  }else if(cloudLoadOk){
    // Облако прочитано, но реально пустое — показываем пусто (НИКОГДА не пишем тестовые автоматически)
    orders=[];tasks=[];
  }else{
    // Облако НЕдоступно — работаем с локальным кэшем, ничего не записываем
    orders=(cached&&Array.isArray(cached.orders))?cached.orders:[];
    tasks=(cached&&Array.isArray(cached.tasks))?cached.tasks:[];
    if(!cached)toast('⚠️ Нет связи с облаком — данные не загружены');
  }
  renderTabs();renderTab(tab);
  startSync();
}

  });

  document.addEventListener('visibilitychange',function(){if(!document.hidden){bumpActivity();syncFromCloud();}});
  window.addEventListener('focus',function(){bumpActivity();syncFromCloud();});
}
function startSync(){
  setupActivity();

    if(Date.now()-lastActivity>IDLE_LIMIT)return;       // нет действий 3+ мин — пауза (экономия запросов)
    syncFromCloud();
  },SYNC_INTERVAL);
}

function renderTab(t){
  tab=t;

  if(t==='list'||t==='master')markOrdersSeen();
  if(t==='payments')markPaymentsSeen();
  renderTabs();

  if(t==='list'){m.innerHTML=tplList();return;}
  else if(t==='calendar')m.innerHTML=tplCalendar(false);
  else if(t==='cal-master')m.innerHTML=tplCalendar(true);
  else if(t==='add')m.innerHTML=tplAdd();
  else if(t==='stats')m.innerHTML=tplStats();
  else if(t==='finance'&&(role==='manager'||role==='director'))m.innerHTML=tplStats();
  else if(t==='payments')m.innerHTML=tplPayments();
  else if(t==='analytics')m.innerHTML=tplWeeklyAnalytics();
  else if(t==='finance')m.innerHTML=tplSvetaFinance();
  else if(t==='todos'){m.innerHTML=tplTasks();return;}
  else m.innerHTML=tplMaster();

function moLbl(m){if(!m)return'';const[y,mo]=m.split('-');return new Date(y,mo-1).toLocaleString('ru',{month:'long',year:'numeric'});}

function getFilteredOrders(){
  var hasSearch=!!search;
  return orders.filter(function(o){
    var isArchived=o.status==='archived';
    // Поиск показывает всё. Без поиска: обычный режим скрывает архив, режим архива показывает только архив.
    if(!hasSearch){
      if(!showArchive&&isArchived)return false;
      if(showArchive&&!isArchived)return false;
    }
    if(fStatus!=='all'&&o.status!==fStatus)return false;
    if(fUrgent&&!o.urgent)return false;
    if(fMonth!=='all'&&o.month!==fMonth)return false;
    if(fMaster!=='all'&&o.master!==fMaster)return false;
    if(hasSearch){var q=search.toLowerCase();if(!o.num.toLowerCase().includes(q)&&!(o.client||'').toLowerCase().includes(q)&&!(o.toys||'').toLowerCase().includes(q))return false;}
    return true;
  }).sort(function(a,b){
    if(fSort==='date')return b.created-a.created;
    if(fSort==='date_asc')return a.created-b.created;
    if(fSort==='deadline'){
      var ma=a.month||'9999-99',mb=b.month||'9999-99';
      if(ma!==mb)return ma<mb?-1:1;
      var da=a.deliveryDay||99,db=b.deliveryDay||99;
      return da-db;
    }
    if(fSort==='margin'){var ma=calcMargin(a)||0,mb=calcMargin(b)||0;return mb-ma;}
    return b.created-a.created;
  });
}

async function addNote(orderId){
  var inp=document.getElementById('note-inp-'+orderId);
  if(!inp)return;
  var text=inp.value.trim();
  if(!text){toast('Введите текст заметки');return;}
  var o=orders.find(function(x){return x.id===orderId;});
  if(!o)return;
  if(!o.notes)o.notes=[];
  var authorName=role==='manager'?'Александра':'Даша';
  o.notes.push({text:text,author:authorName,ts:Date.now()});
  await saveOrders(orders);
  inp.value='';
  renderTab(tab);
  toast('Заметка добавлена');
}

function orderCard(o){
  var st=STATUSES[o.status]||STATUSES.new;
  var src=SOURCES[o.source]||{label:o.source||'—',cls:'b-wait'};
  var oTotal=orderTotal(o);
  var paid=oTotal>0&&(o.prepaid||0)>=oTotal;
  var canFinance=role==='manager'||role==='director';
  var canEdit=(role==='manager'||role==='director')&&!isPreviewMode;
  var moStr=moLbl(o.month);
  var rest=Math.max(0,oTotal-(o.prepaid||0));
  var margin=canFinance?calcMargin(o):null;
  var isExpanded=expandedCards.has(o.id);
  var oItems=getItems(o);
  var wt=orderWeight(o);
  var ht=oItems.length===1?(parseFloat(oItems[0].heightCm)||0):0;
  var oPrice=orderTotal(o);

  // Badges
  var closed=isClosed(o);
  var badges='<span class="badge '+st.cls+'">'+st.label+'</span>';
  if(closed)badges+=' <span class="badge" style="background:#d9f0e3;color:#2a7a45">🔒 Закрыт</span>';
  if(o.urgent)badges+=' <span class="badge b-urgent">Срочно</span>';
  if(paid)badges+=' <span class="badge b-paid">Оплачен</span>';
  else if(o.prepaid>0)badges+=' <span class="badge b-part">Предоплата</span>';
  else badges+=' <span class="badge" style="background:#f5dada;color:#6e2222">Без предоплаты</span>';
  badges+=' <span class="badge '+src.cls+'">'+src.label+'</span>';

function setStatus(id,val){
  var o=orders.find(function(x){return x.id===id;});
  if(!o)return;
  o.status=val;
  if(val==='sent'&&!o.closedAt){o.closedAt=Date.now();}
  // Сначала мгновенно обновляем интерфейс и показываем уведомление,
  // затем сохраняем в облако в фоне — пользователь не ждёт сеть.
  renderTab(tab);
  toast('Статус: '+(STATUSES[val]||{label:val}).label);
  saveOrders(orders);
}
// Закрыть заказ: клиент полностью оплатил. Ставим флаг closed, дату закрытия и полную оплату.
// Выплата мастеру (Свете) — отдельно, во вкладке «Выплаты».
async function closeOrder(id){
  var o=orders.find(function(x){return x.id===id;});
  if(!o)return;
  var tot=orderTotal(o);
  if(!confirm('Закрыть заказ '+o.num+'?\nОплата будет проставлена полной ('+fmt(tot)+') и заказ отметится как закрытый.'))return;
  o.closed=true;
  o.closedAt=Date.now();
  o.prepaid=tot; // полная оплата от клиента
  await saveOrders(orders);
  renderTab(tab);
  toast('Заказ '+o.num+' закрыт ✓');
}
async function reopenOrder(id){
  var o=orders.find(function(x){return x.id===id;});
  if(!o)return;
  if(!confirm('Открыть заказ '+o.num+' заново? Метка закрытия снимется (сумма оплаты останется как есть).'))return;
  o.closed=false;
  delete o.closedAt;
  await saveOrders(orders);
  renderTab(tab);
  toast('Заказ '+o.num+' открыт');
}
async function markSdek(id){
  const o=orders.find(function(x){return x.id===id;});
  if(o){o.sdek=true;await saveOrders(orders);renderTab(tab);toast('СДЭК отмечен');}
}
async function saveSdekNum(id,val){
  var o=orders.find(function(x){return x.id===id;});
  if(!o)return;
  o.sdekNum=val.trim();
  o.sdek=!!val.trim();
  await saveOrders(orders);
  renderTab(tab);
  toast('Номер накладной сохранён');
}
async function delOrder(id){
  if(!confirm('Удалить заказ?'))return;
  orders=orders.filter(function(x){return x.id!==id;});
  await saveOrders(orders);renderTab(tab);toast('Заказ удалён');
}
function jumpTo(id){
  if(role==='master'){
    // Света: переходим в её вкладку и показываем именно нужный заказ
    var ord=orders.find(function(x){return x.id===id;});
    fStatus='all';fMonth='all';
    // если заказ уже завершён — открываем архив, иначе обычный список
    showArchive=!!(ord&&(ord.status==='sent'||ord.status==='done'||ord.status==='archived'));
    expandedCards.add(id);
    renderTab('master');
    setTimeout(function(){
      const el=document.getElementById('c-'+id);
      if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='2px solid var(--accent)';setTimeout(function(){el.style.outline='';},2000);}
    },80);
    return;
  }
  fStatus='all';fMonth='all';search='';showArchive=false;
  expandedCards.add(id);
  renderTab('list');
  setTimeout(function(){
    const el=document.getElementById('c-'+id);
    if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='2px solid var(--accent)';setTimeout(function(){el.style.outline='';},2000);}
  },80);
}
// ── Выгрузка для СДЭК (статус «Отправка планируется») ──
// Фильтруем по мастеру: Света видит только свои, остальные — только Дашины (sdek=true)
function sdekExportList(){
  return orders.filter(function(o){
    if(o.status!=='planned')return false;
    if(role==='master')return o.master===masterName;
    if(role==='director')return o.master==='Даша'; // Даша — только свои накладные
    return true; // COO видит все планируемые отправки
  }).sort(function(a,b){return (a.num||'').localeCompare(b.num||'');});
}
function sdekExportText(){
  var list=sdekExportList();
  var now=new Date().toLocaleDateString('ru',{day:'numeric',month:'long'});
  var lines=['📦 СДЭК · '+list.length+' '+pluralPosylka(list.length)+' · '+now,''];
  var isMasterCopy=role==='master';
  list.forEach(function(o){
    var wt=orderWeight(o)?orderWeight(o)+' г':'вес —';
    var nak=o.sdekNum?('накл. '+o.sdekNum):'накл. — (нет!)';
    var toy=orderToyLabel(o);
    lines.push(o.num+(isMasterCopy?'':(' · '+(o.client||'—')))+(role==='manager'&&o.master?' ['+o.master+']':''));
    if(toy)lines.push(toy);
    if(!isMasterCopy&&o.phone)lines.push(o.phone);
    lines.push(nak+' · '+wt);
    lines.push('');
  });
  return lines.join('\n').trim();
}
function pluralPosylka(n){
  var n10=n%10,n100=n%100;
  if(n10===1&&n100!==11)return 'посылка';
  if(n10>=2&&n10<=4&&(n100<10||n100>=20))return 'посылки';
  return 'посылок';
}
function pluralZakaz(n){
  var n10=n%10,n100=n%100;
  if(n10===1&&n100!==11)return 'заказ';
  if(n10>=2&&n10<=4&&(n100<10||n100>=20))return 'заказа';
  return 'заказов';
}

async function moveNextWeekToWork(){
  var nwOrders=orders.filter(function(o){return o.status==='nextweek';});
  if(!nwOrders.length){toast('Нет заказов «След. неделя»');return;}
  var nums=nwOrders.map(function(o){return o.num;}).join(', ');
  if(!confirm('Перевести в «В работе» '+nwOrders.length+' '+pluralZakaz(nwOrders.length)+'?\n\n'+nums+'\n\nЭто изменит статус всех перечисленных заказов.'))return;
  nwOrders.forEach(function(o){o.status='work';});
  await saveOrders(orders);
  renderTab(tab);
  toast('Переведено в работу: '+nwOrders.map(function(o){return o.num;}).join(', '));
}
async function markSdekSent(){
  var checked=[].slice.call(document.querySelectorAll('.sdek-chk:checked')).map(function(cb){return cb.dataset.oid;});
  if(!checked.length){toast('Выберите хотя бы один заказ');return;}
  var names=[];
  checked.forEach(function(id){
    var o=orders.find(function(x){return x.id===id;});
    if(o){o.status='sent';if(!o.closedAt)o.closedAt=Date.now();names.push(o.num);}
  });
  await saveOrders(orders);
  var modal=document.getElementById('sdek-export-modal');
  if(modal)modal.remove();
  renderTab(tab);
  toast('Отправлены: '+names.join(', ')+' ✓');
}
async function copySdekText(){
  var txt=sdekExportText();
  try{await navigator.clipboard.writeText(txt);toast('Скопировано ✓');}
  catch(e){
    // запасной способ
    var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');toast('Скопировано ✓');}catch(e2){toast('Не удалось скопировать');}
    ta.remove();
  }
}
async function downloadSdekPng(){
  var node=document.getElementById('sdek-export-content');
  if(!node){toast('Нет данных');return;}
  if(typeof html2canvas==='undefined'){toast('html2canvas не загружен');return;}
  toast('Создаём картинку...');
  try{
    var canvas=await html2canvas(node,{backgroundColor:'#ffffff',scale:2,useCORS:true,logging:false});
    var a=document.createElement('a');
    a.href=canvas.toDataURL('image/png');
    a.download='sdek_'+new Date().toISOString().slice(0,10)+'.png';
    a.click();
    toast('Картинка сохранена ✓');
  }catch(e){toast('Ошибка: '+e.message);}
}

function tplCalendar(isMasterView){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  const moStr=new Date(y,m).toLocaleString('ru',{month:'long',year:'numeric'});
  const first=new Date(y,m,1).getDay();
  const start=first===0?6:first-1;
  const days=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  const today=new Date();
  const moKey=y+'-'+String(m+1).padStart(2,'0');
  const allForMonth=orders.filter(function(o){return o.month===moKey;});
  const moOrders=isMasterView?allForMonth.filter(function(o){return o.master===masterName;}):allForMonth;
  const colors={new:'#3a8fa3',work:'#8a7a30',ready:'#2a7a45',sent:'#6b52a0',done:'#7a7570'};
  const tabId=isMasterView?'cal-master':'calendar';

  let cells='';
  for(let i=0;i<start;i++)cells+='<div class="cal-cell other"><span class="cal-dn">'+(prevDays-start+i+1)+'</span></div>';
  for(let d=1;d<=days;d++){
    const isT=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    const dayOs=moOrders.filter(function(o){return(o.deliveryDay||0)===d;});
    let dots=dayOs.map(function(o){
      const c=colors[o.status]||colors.work;
      return '<span class="cal-dot" style="background:'+c+'22;color:'+c+'" onclick="jumpTo(\''+o.id+'\')">'+o.num+'</span>';
    }).join('');
    cells+='<div class="cal-cell'+(isT?' today':'')+'"><span class="cal-dn">'+d+'</span>'+dots+'</div>';
  }
  const rem=(start+days)%7;
  for(let i=1;i<=(rem?7-rem:0);i++)cells+='<div class="cal-cell other"><span class="cal-dn">'+i+'</span></div>';

  let moRows='';
  if(moOrders.length===0){
    moRows='<div style="padding:12px;text-align:center;font-size:13px;color:var(--text3)">Нет заказов</div>';
  }else{
    moOrders.forEach(function(o){
      const st=STATUSES[o.status]||STATUSES.new;
      moRows+='<div class="cal-mo-row">'
        +'<span class="cal-mo-num">'+o.num+'</span>'
        +'<span class="cal-mo-toy">'+o.toys+(o.urgent?' ⚡':'')+(o.deliveryDay?' · '+o.deliveryDay+'-го':'')+'</span>'
        +'<span class="badge '+st.cls+'" style="font-size:9px">'+st.label+'</span>'
        +'<span style="font-size:11px;color:var(--text3)">'+o.master+'</span>'
        +'</div>';
    });
  }

  let weekSummary='';
  if(isMasterView){
    const weeksMap={};
    moOrders.forEach(function(o){
      if(!o.deliveryDay)return;
      const wk=Math.ceil(o.deliveryDay/7);
      if(!weeksMap[wk])weeksMap[wk]=0;
      weeksMap[wk]++;
    });
    const wkeys=Object.keys(weeksMap).sort();
    if(wkeys.length){
      weekSummary='<div style="padding:10px 14px;border-top:1px solid var(--border)">'
        +'<div class="section-lbl">Нагрузка по неделям</div>';
      wkeys.forEach(function(wk){
        const cnt=weeksMap[wk];
        const load=cnt>=4?'🔴 много':cnt>=2?'🟡 средне':'🟢 свободно';
        weekSummary+='<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)">'
          +'<span style="font-weight:700;color:var(--text2)">Неделя '+wk+'</span>'
          +'<span style="color:var(--text3)">'+cnt+' заказов</span>'
          +'<span>'+load+'</span>'
          +'</div>';
      });
      weekSummary+='</div>';
    }
  }

  return '<div class="card" style="margin-bottom:12px">'
    +'<div class="cal-header">'
    +'<button class="cal-btn" onclick="calNav(-1,\''+tabId+'\')">←</button>'
    +'<div class="cal-title" style="text-transform:capitalize">'+moStr+'</div>'
    +'<button class="cal-btn" onclick="calNav(1,\''+tabId+'\')">→</button>'
    +'</div>'
    +'<div class="cal-grid">'
    +['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(function(d){return'<div class="cal-dh">'+d+'</div>';}).join('')
    +cells
    +'</div>'
    +'<div class="cal-month-orders">'
    +'<div class="section-lbl">Заказов в месяце — '+moOrders.length+'</div>'
    +moRows
    +'</div>'
    +weekSummary
    +'</div>';
}

// ── ФИНАНСОВЫЕ КОНСТАНТЫ ──
const FIXED_COST = 700;           // фиксированные расходы на игрушку
const VAR_COST_DASHA = 0.25;      // переменные расходы за грамм — Даша (250 руб/кг)
const VAR_COST_SVETA = 0.40;      // переменные расходы за грамм — Света (400 руб/кг)
const SASHA_PCT = 0.20;           // % Александры
const NASTYA_PER_TOY = 300;       // Настя (швея одежды на аутсорсе) — 300₽ с каждой игрушки Даши
const TAX_PCT = 0;                // налог (0 = не учитываем)
const DARYA_DIVIDEND_PCT = 0.05;  // дивиденды Дарьи как автора проекта — 5% от чистой прибыли

// Стоимость Насти: 300₽ за каждую игрушку, сшитую Дашей (у Светы — своя одежда)
function calcNastya(o){
  if(o.master!=='Даша')return 0;
  return NASTYA_PER_TOY*orderQty(o);
}

function calcCosts(o){
  // Считаем по каждой игрушке отдельно, затем суммируем
  // Архивные заказы могут хранить свою ставку расхода по весу (o.varRate, ₽/г).
  // Новые заказы поля не имеют — считаются по текущим ставкам (250/400 ₽/кг).
  var varPerG = (typeof o.varRate==='number' && o.varRate>0)
    ? o.varRate
    : (o.master==='Света' ? VAR_COST_SVETA : VAR_COST_DASHA);
  var items = getItems(o);
  var fixed=0, variable=0, master=0;
  items.forEach(function(it){
    var cnt=parseInt(it.count)||1;
    fixed    += FIXED_COST * cnt;
    variable += (parseFloat(it.weightG)||0) * varPerG * cnt;
    master   += calcItemMasterPay(it, o.master);
  });
  var materials = fixed + variable;
  var price = orderTotal(o);
  var sasha  = Math.round((price - materials) * SASHA_PCT);
  if(sasha < 0) sasha = 0;
  var nastya = calcNastya(o);
  var tax = Math.round(price * TAX_PCT);
  var profit = price - materials - sasha - master - nastya - tax;
  return {fixed:fixed, variable:variable, materials:materials, master:master, sasha:sasha, nastya:nastya, tax:tax, profit:profit};
}

// Период для аналитики
var statsPeriod = 'month'; // 'week' | 'month' | 'all'
var statsMonthKey = '';    // для кастомного месяца

function getWeekRange(){
  var now=new Date();
  var day=now.getDay()||7;
  var mon=new Date(now); mon.setDate(now.getDate()-day+1); mon.setHours(0,0,0,0);
  var sun=new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
  return{start:mon,end:sun};
}

function filterByPeriod(ords, period, customMonth){
  var now=new Date();
  if(period==='week'){
    var r=getWeekRange();
    // закрытые заказы относим к дате закрытия, открытые — к дате создания
    return ords.filter(function(o){var d=new Date(isClosed(o)?closedDate(o):o.created);return d>=r.start&&d<=r.end;});
  }
  if(period==='month'){
    var curMo=customMonth||(now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'));
    return ords.filter(function(o){return(o.month||'')=== curMo;});
  }
  return ords; // all
}

// Срок сдачи заказа (для отнесения «в работе» к периоду)
function planDate(o){
  if(o&&o.deliveryDay&&o.month){
    var p=String(o.month).split('-');
    return new Date(+p[0],+p[1]-1,parseInt(o.deliveryDay),12,0,0);
  }
  return null;
}
function getFinanceRange(){
  if(finPeriod==='week'){
    var r=getAnalyticsWeekRange(finWeekOffset);
    r.label=r.start.toLocaleDateString('ru',{day:'numeric',month:'long'})+' – '+r.end.toLocaleDateString('ru',{day:'numeric',month:'long'});
    return r;
  }
  if(finPeriod==='month'){
    var mk=finMonthKey||(function(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');})();
    var p=mk.split('-'),y=+p[0],m=+p[1];
    return {start:new Date(y,m-1,1,0,0,0,0),end:new Date(y,m,0,23,59,59,999),label:moLbl(mk),monthKey:mk};
  }
  if(finPeriod==='custom'&&finFrom&&finTo){
    var df=new Date(finFrom),dt=new Date(finTo);dt.setHours(23,59,59,999);
    return {start:df,end:dt,label:df.toLocaleDateString('ru')+' – '+dt.toLocaleDateString('ru')};
  }
  return {start:null,end:null,label:'Задайте даты'};
}

function tplStats(){
  // ── ФИНАНСЫ: за период = (все активные заказы) + (закрытые в периоде) ──
  var r=getFinanceRange();
  var openOrders=orders.filter(function(o){return !isClosed(o);});
  var inRange=function(d){return d&&r.start&&r.end&&d>=r.start&&d<=r.end;};

  // «Ждём оплату» = только заказы в активной работе: в работе / готов / планируется отправка.
  // «Новые» ещё не взяты в работу, «отправлен» — уже закрытый цикл.
  var workGroup=openOrders.filter(function(o){return o.status==='work'||o.status==='ready'||o.status==='planned';});
  var closedGroup=(r.start&&r.end)?orders.filter(function(o){return isClosed(o)&&inRange(new Date(closedDate(o)));}):[]; // закрытые за период
  var combined=workGroup.concat(closedGroup);

  // Неприкасаемая «касса будущих заказов»: предоплаты по заказам, которые ещё не сделаны
  // (статусы «Новый» и «В работе»). Эти деньги нельзя тратить — они за невыполненные заказы.
  var futureGroup=orders.filter(function(o){return (o.status==='new'||o.status==='work')&&!isClosed(o);});
  var futurePrepaid=futureGroup.reduce(function(s,o){return s+(parseFloat(o.prepaid)||0);},0);

  function sums(list){
    var rev=list.reduce(function(s,o){return s+orderTotal(o);},0);
    var pre=list.reduce(function(s,o){return s+(o.prepaid||0);},0);
    return {
      rev:rev, pre:pre, rest:Math.max(0,rev-pre), prePct:rev>0?Math.round(pre/rev*100):0,
      dashaZp:list.filter(function(o){return o.master==='Даша';}).reduce(function(s,o){return s+calcMasterPay(o);},0),
      svetaZp:list.filter(function(o){return o.master==='Света';}).reduce(function(s,o){return s+calcMasterPay(o);},0),
      sasha:list.reduce(function(s,o){return s+calcCosts(o).sasha;},0),
      nastya:list.reduce(function(s,o){return s+calcCosts(o).nastya;},0),
      profit:list.reduce(function(s,o){return s+calcCosts(o).profit;},0),
      dashaN:list.filter(function(o){return o.master==='Даша';}).length,
      svetaN:list.filter(function(o){return o.master==='Света';}).length
    };
  }
  var T=sums(combined);
  T.margin=T.rev>0?Math.round(T.profit/T.rev*100):0;

  var html='';
  html+='<div style="font-size:11px;color:var(--text3);margin-bottom:10px">Что сейчас в работе + что закрыто за период. Итоги по всем закрытым — во вкладке «Аналитика».</div>';

  // ── СЕЛЕКТОР ПЕРИОДА ──
  html+='<div class="filters" style="margin-bottom:10px">';
  [['week','Неделя'],['month','Месяц'],['custom','Период']].forEach(function(p){
    html+='<button class="chip '+(finPeriod===p[0]?'active':'')+'" onclick="setFinPeriod(\''+p[0]+'\')">'+p[1]+'</button>';
  });
  html+='</div>';
  if(finPeriod==='week'){
    html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
      +'<button class="btn btn-sm btn-secondary" onclick="finWeekNav(-1)">← Пред.</button>'
      +'<div style="font-size:12px;color:var(--text2);font-weight:600;text-align:center">'+r.label+'</div>'
      +'<button class="btn btn-sm btn-secondary" onclick="finWeekNav(1)">След. →</button>'
      +'</div>';
  }else if(finPeriod==='month'){
    var fmonths=[...new Set(orders.map(function(o){return o.month;}).filter(Boolean))].sort().reverse();
    html+='<div class="filters" style="margin-bottom:12px">';
    fmonths.forEach(function(m){
      html+='<button class="chip '+(r.monthKey===m?'active':'')+'" onclick="setFinMonth(\''+m+'\')">'+moLbl(m)+'</button>';
    });
    html+='</div>';
  }else{
    html+='<div style="display:flex;gap:8px;margin-bottom:12px;align-items:flex-end">'
      +'<div class="fg" style="margin:0;flex:1"><label>С</label><input type="date" value="'+finFrom+'" onchange="setFinFrom(this.value)"></div>'
      +'<div class="fg" style="margin:0;flex:1"><label>По</label><input type="date" value="'+finTo+'" onchange="setFinTo(this.value)"></div>'
      +'</div>';
  }

  // ── КАССА БУДУЩИХ ЗАКАЗОВ (неприкасаемо) ──
  html+='<div style="background:linear-gradient(135deg,#f0efb1,#e5e4b0);border-radius:16px;border:1px solid var(--border2);padding:16px;margin-bottom:12px;box-shadow:var(--sh)">'

// ── Аналитика (итоги по закрытым заказам) ──
var analyticsPeriod='week';   // 'week' | 'month' | 'all'
var analyticsWeekOffset=0;    // смещение недели (0 = текущая)
var analyticsMonthKey='';     // выбранный месяц 'YYYY-MM' ('' = текущий)

function getAnalyticsWeekRange(offset){
  var now=new Date();
  var day=now.getDay()||7;
  var mon=new Date(now); mon.setDate(now.getDate()-day+1+offset*7); mon.setHours(0,0,0,0);
  var sun=new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
  return{start:mon,end:sun};
}

// Диапазон выбранного периода + подпись
function getAnalyticsRange(){
  if(analyticsPeriod==='week'){
    var r=getAnalyticsWeekRange(analyticsWeekOffset);
    r.label=r.start.toLocaleDateString('ru',{day:'numeric',month:'long'})+' – '+r.end.toLocaleDateString('ru',{day:'numeric',month:'long',year:'numeric'});
    return r;
  }
  if(analyticsPeriod==='month'){
    var mk=analyticsMonthKey||(function(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');})();
    var p=mk.split('-'),y=+p[0],m=+p[1];
    return {start:new Date(y,m-1,1,0,0,0,0),end:new Date(y,m,0,23,59,59,999),label:moLbl(mk),monthKey:mk};
  }
  return {start:new Date(0),end:new Date(8640000000000000),label:'Всё время'};
}

function getClosedPeriodOrders(){
  var r=getAnalyticsRange();
  return orders.filter(function(o){
    if(!isClosed(o))return false;
    var d=new Date(closedDate(o));
    return d>=r.start&&d<=r.end;
  });
}
// совместимость со старым именем (используется в экспорте)
function getClosedWeekOrders(){return getClosedPeriodOrders();}

function analyticsWeekNav(d){analyticsWeekOffset+=d;renderTab('analytics');}
function setAnalyticsPeriod(p){analyticsPeriod=p;if(p!=='month')analyticsMonthKey='';renderTab('analytics');}
function setAnalyticsMonth(m){analyticsMonthKey=m;renderTab('analytics');}

function renderDonutChart(data,total){
  var size=180;var cx=size/2;var cy=size/2;var r=62;var strokeW=26;
  var sum=data.reduce(function(s,d){return s+d.val;},0);
  if(!sum)return'';
  var paths='';var offset=0;var circumference=2*Math.PI*r;
  // Legend
  var legend='<div style="display:flex;flex-direction:column;gap:6px;justify-content:center;flex:1">';
  data.forEach(function(d){
    var dashArr=(d.val/sum)*circumference;
    var dashOff=-(offset/sum)*circumference;
    paths+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" '
      +'stroke="'+d.color+'" stroke-width="'+strokeW+'" '
      +'stroke-dasharray="'+dashArr+' '+circumference+'" '
      +'stroke-dashoffset="'+dashOff+'" '
      +'transform="rotate(-90 '+cx+' '+cy+')">'
      +'</circle>';
    offset+=d.val;
    var pctLbl=total>0?Math.round(d.val/total*100)+'%':'';
    legend+='<div style="display:flex;align-items:center;gap:6px;font-size:11px">'
      +'<div style="width:10px;height:10px;border-radius:3px;background:'+d.color+';flex-shrink:0"></div>'
      +'<span style="color:var(--text2);flex:1">'+d.label+'</span>'
      +'<span style="font-weight:700;color:var(--text1)">'+pctLbl+'</span>'
      +'</div>';
  });
  legend+='</div>';
  return '<div style="background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:12px;box-shadow:var(--sh)">'
    +'<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">Распределение средств</div>'
    +'<div style="display:flex;align-items:center;gap:16px">'
    +'<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" style="flex-shrink:0">'+paths+'</svg>'
    +legend
    +'</div>'
    +'</div>';
}

async function downloadAnalyticsPng(){

  var name='analytics_'+(new Date(r.start.getTime()-r.start.getTimezoneOffset()*60000)).toISOString().slice(0,10)+'.png';
  try{

function exportAnalyticsCsv(){

  closed.forEach(function(o){
    var c=calcCosts(o);
    var d=new Date(closedDate(o));
    rows.push([o.num,o.client||'',o.master||'',orderTotal(o),orderWeight(o),orderQty(o),orderEmbCount(o),c.materials,c.master,c.sasha,c.nastya,c.profit,d.toLocaleDateString('ru')]);

  var totProfit=closed.reduce(function(s,o){return s+calcCosts(o).profit;},0);

  var bom='﻿';
  var blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);

function calcZpSveta(weightG,embCount){
  var w=parseFloat(weightG)||0;
  var base;
  if(w<1900)base=2300;
  else if(w<2500)base=2500;
  else if(w<3000)base=2700;
  else if(w<3400)base=2800;
  else if(w<3800)base=2900;
  else if(w<4400)base=3100;
  else if(w<=5500)base=3400;
  else base=Math.floor((1800+w*0.3)/100)*100;
  return base+(parseInt(embCount)||0)*400;
}
function calcMasterPay(o){
  // Сумма ЗП по всем игрушкам заказа
  return getItems(o).reduce(function(s,it){return s+calcItemMasterPay(it,o.master);},0);
}
function calcAdvance(o){
  if(o.master==='Света') return Math.round(calcMasterPay(o)*0.3);
  return 0;
}
function calcPostpay(o){
  if(o.master==='Света') return calcMasterPay(o)-calcAdvance(o);
  return calcMasterPay(o);
}
// Остаток к выплате мастеру: невыплаченный аванс + невыплаченная доплата
function remainingPay(o){
  return (o.advancePaid?0:calcAdvance(o))+(o.postpayPaid?0:calcPostpay(o));
}

function copyField(val,btn){

    var orig=btn.textContent;
    btn.textContent='✓ Скопировано';
    btn.style.color='var(--green)';
    setTimeout(function(){btn.textContent=orig;btn.style.color='';},1500);
  }).catch(function(){

    var ta=document.createElement('textarea');
    ta.value=val;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    var orig=btn.textContent;
    btn.textContent='✓ Скопировано';
    setTimeout(function(){btn.textContent=orig;},1500);
  });
}

function tplSvetaFinance(){
  var now=new Date();
  var sf=window.svetaPeriod||'week';
  var svetaWkOff=window.svetaWkOff||0;
  var svetaMon=window.svetaMon||'';

  // ── Вычисляем диапазон ──
  var rangeStart=null,rangeEnd=null,rangeLabel='';
  if(sf==='week'){
    // Понедельник текущей/смещённой недели
    var ws=new Date(now);
    ws.setDate(now.getDate()-((now.getDay()||7)-1)+svetaWkOff*7);
    ws.setHours(0,0,0,0);
    var we=new Date(ws);we.setDate(ws.getDate()+6);we.setHours(23,59,59,999);
    rangeStart=ws;rangeEnd=we;
    var opts={day:'numeric',month:'short'};
    rangeLabel=ws.toLocaleDateString('ru',opts)+' – '+we.toLocaleDateString('ru',opts);
  } else if(sf==='month'&&svetaMon){
    var p=svetaMon.split('-').map(Number);
    rangeStart=new Date(p[0],p[1]-1,1,0,0,0,0);
    rangeEnd=new Date(p[0],p[1],0,23,59,59,999);
    rangeLabel=moLbl(svetaMon);
  }

  function inPeriod(o){
    if(!rangeStart)return true; // «Всё время»
    var d=new Date(isClosed(o)?closedDate(o):o.created);
    return d>=rangeStart&&d<=rangeEnd;
  }

  var myAll=orders.filter(function(o){return o.master==='Света';});
  var myOrders=myAll.filter(inPeriod);

  // «В работе» — только статус 'work', без учёта периода
  var inWorkOrds=myAll.filter(function(o){return o.status==='work';});
  var inWork=inWorkOrds.length;
  var done=myOrders.filter(function(o){return isClosed(o);}).length;
  var closedOrds=myOrders.filter(function(o){return isClosed(o);});

  var totalGot=myOrders.reduce(function(s,o){
    return s+(o.advancePaid?calcAdvance(o):0)+(o.postpayPaid?calcPostpay(o):0);
  },0);
  // «Ожидается» — невыплаченное по всем заказам в работе/готов/планируется (без фильтра по периоду)
  var pendingOrds=myAll.filter(function(o){return o.status==='work'||o.status==='ready'||o.status==='planned';});
  var totalPending=pendingOrds.reduce(function(s,o){
    return s+(!o.advancePaid?calcAdvance(o):0)+(!o.postpayPaid?calcPostpay(o):0);
  },0);

  // ── Переключатели периода ──
  var html='<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">';
  [{id:'week',label:'Неделя'},{id:'month',label:'Месяц'},{id:'all',label:'Всё время'}].forEach(function(p){
    var isAct=sf===p.id;
    html+='<button class="chip'+(isAct?' active':'')+'" onclick="window.svetaPeriod=\''+p.id+'\';window.svetaWkOff=0;renderTab(\'finance\')">'+p.label+'</button>';
  });
  html+='</div>';

  // Навигация по неделям
  if(sf==='week'){
    var isCurrentWeek=svetaWkOff===0;
    html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
      +'<button class="btn btn-sm btn-secondary" onclick="window.svetaWkOff='+(svetaWkOff-1)+';renderTab(\'finance\')">← Пред.</button>'
      +'<div style="font-size:12px;color:var(--text2);font-weight:600;text-align:center">'+rangeLabel+(isCurrentWeek?' <span style="font-size:10px;color:var(--text3)">(эта неделя)</span>':'')+'</div>'
      +'<button class="btn btn-sm btn-secondary" '+(isCurrentWeek?'disabled style="opacity:.4"':' onclick="window.svetaWkOff='+(svetaWkOff+1)+';renderTab(\'finance\')"')+'>След. →</button>'
      +'</div>';
  }

  // Выбор месяца
  if(sf==='month'){
    var months=[...new Set(myAll.map(function(o){return o.month;}).filter(Boolean))].sort().reverse();
    if(!svetaMon&&months.length)svetaMon=window.svetaMon=months[0];
    html+='<div class="filters" style="margin-bottom:12px">';
    months.forEach(function(m){
      html+='<button class="chip'+(svetaMon===m?' active':'')+'" onclick="window.svetaMon=\''+m+'\';renderTab(\'finance\')">'+moLbl(m)+'</button>';
    });
    html+='</div>';
  }

  // ── Карточки итогов ──
  html+='<div class="stats-grid" style="margin-bottom:12px">'
    +'<div class="stat-card"><div class="stat-val" style="color:var(--green)">'+fmt(totalGot)+'</div><div class="stat-lbl">Получено'+(rangeLabel?' за период':'')+'</div></div>'
    +'<div class="stat-card"><div class="stat-val" style="color:var(--orange)">'+fmt(totalPending)+'</div><div class="stat-lbl">Ожидается</div></div>'
    +'</div>';

  // ── Раскрывающиеся группы заказов ──
  var sfwOpen=window.svetaFwOpen||{};

  function ordMiniRow(o){
    var toy=orderToyLabel(o);
    var mo=moLbl(o.month);
    return '<div onclick="jumpTo(\''+o.id+'\')" style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer" onmouseenter="this.style.background=\'var(--accent-bg)\'" onmouseleave="this.style.background=\'\'">'
      +'<span style="font-family:serif;font-weight:700;color:var(--accent);font-size:13px;min-width:44px">'+o.num+'</span>'
      +(toy?'<span style="font-size:11px;font-weight:700;color:var(--accent2);background:var(--accent-bg);padding:1px 6px;border-radius:6px">'+toy+'</span>':'')
      +'<span style="font-size:12px;color:var(--text3);flex:1">'+mo+'</span>'
      +'<span class="badge '+(STATUSES[o.status]||STATUSES.new).cls+'" style="font-size:10px">'+(STATUSES[o.status]||STATUSES.new).label+'</span>'
      +'</div>';
  }

  html+='<div style="background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:12px;box-shadow:var(--sh)">';
  // В работе сейчас
  html+='<div onclick="window.svetaFwOpen=window.svetaFwOpen||{};window.svetaFwOpen.work=!window.svetaFwOpen.work;renderTab(\'finance\')" style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer;user-select:none">'
    +'<span style="color:var(--text3)">В работе сейчас</span>'
    +'<span style="font-weight:700">'+inWork+' '+pluralZakaz(inWork)+(inWork?' '+(sfwOpen.work?'▴':'▾'):'')+'</span>'
    +'</div>';
  if(sfwOpen.work&&inWorkOrds.length){
    html+='<div style="padding:0 2px">';
    inWorkOrds.sort(function(a,b){return (a.num||'').localeCompare(b.num||'');}).forEach(function(o){html+=ordMiniRow(o);});
    html+='</div>';
  }
  // Закрыто за период
  html+='<div onclick="window.svetaFwOpen=window.svetaFwOpen||{};window.svetaFwOpen.closed=!window.svetaFwOpen.closed;renderTab(\'finance\')" style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;cursor:pointer;user-select:none;margin-top:'+(sfwOpen.work&&inWorkOrds.length?'0':'4px')+'">'
    +'<span style="color:var(--text3)">Закрыто за период</span>'
    +'<span style="font-weight:700;color:var(--green)">'+done+' '+pluralZakaz(done)+(done?' '+(sfwOpen.closed?'▴':'▾'):'')+'</span>'
    +'</div>';
  if(sfwOpen.closed&&closedOrds.length){
    html+='<div style="padding:0 2px">';
    closedOrds.sort(function(a,b){return (a.num||'').localeCompare(b.num||'');}).forEach(function(o){html+=ordMiniRow(o);});
    html+='</div>';
  }
  html+='</div>';

  html+='<div class="section-lbl">История заказов'+(rangeLabel?' · '+rangeLabel:'')+'</div>';
  if(!myOrders.length){html+='<div class="empty"><div class="empty-icon">🧸</div>Нет заказов за период</div>';}
  myOrders.slice().sort(function(a,b){return b.created-a.created;}).forEach(function(o){
    var total=calcMasterPay(o),adv=calcAdvance(o),post=calcPostpay(o);
    var wInfo=orderWeight(o)?orderWeight(o)+'г':'—';
    html+='<div style="background:var(--card);border-radius:12px;border:1px solid var(--border);padding:12px;margin-bottom:8px;box-shadow:var(--sh)">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
      +'<span style="font-family:serif;font-size:14px;color:var(--accent);font-weight:600">'+o.num+'</span>'
      +'<span class="badge '+(STATUSES[o.status]||STATUSES.new).cls+'">'+(STATUSES[o.status]||STATUSES.new).label+'</span>'
      +(isClosed(o)?' <span class="badge" style="background:#d9f0e3;color:#2a7a45">🔒 Закрыт</span>':'')
      +'</div>'
      +'<div style="font-size:12px;color:var(--text3);margin-bottom:8px">'+orderToyLabel(o)+' · '+wInfo+' · '+moLbl(o.month)+'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:12px">'
      +'<div><div style="color:var(--text3)">ЗП итого</div><div style="font-weight:700">'+fmt(total)+'</div></div>'
      +'<div><div style="color:var(--text3)">Получено</div><div style="font-weight:700;color:var(--green)">'+fmt((o.advancePaid?adv:0)+(o.postpayPaid?post:0))+'</div></div>'
      +'<div><div style="color:var(--text3)">Ожидается</div><div style="font-weight:700;color:var(--orange)">'+fmt((!o.advancePaid?adv:0)+(!o.postpayPaid?post:0))+'</div></div>'
      +'</div></div>';
  });
  return html;
}

    html+='<div class="drop-item'+(fMonth===m?' drop-active':'')+'" data-act="mmonth" data-val="'+m+'">'+moLbl(m)+'</div>';
  });
  html+='</div></div>';
  html+='</div>';

  // ── РЕЖИМ АРХИВА: все выполненные заказы мастера, помечены «Выполнен» ──
  if(showArchive){
    var arch=doneList.filter(function(o){return fMonth==='all'||o.month===fMonth;})
      .sort(function(a,b){return (b.month||'').localeCompare(a.month||'')||((b.created||0)-(a.created||0));});
    if(!arch.length){html+='<div class="empty"><div class="empty-icon">📦</div>Архив пуст</div>';return html;}
    arch.forEach(function(o){
      var aItems=getItems(o);
      var params='';
      aItems.forEach(function(it,idx){
        var gl=it.gender?({boy:'Мальчик',girl:'Девочка'}[it.gender]||it.gender):'';
        params+='<div style="'+(idx?'margin-top:6px;':'')+'font-size:12px;font-weight:700;color:var(--accent)">'+(it.toyType||'Игрушка')+(((parseInt(it.count)||1)>1)?' ×'+it.count:'')+'</div>';
        var line=[];

        if(it.heightCm)line.push(it.heightCm+' см');
        if(it.embCount)line.push('вышивка ×'+it.embCount+(it.embText?' «'+it.embText+'»':''));
        if(line.length)params+='<div style="font-size:12px;color:var(--text3)">'+line.join(' · ')+'</div>';
        if(gl)params+='<div style="font-size:12px;color:var(--text3)">Пол: '+gl+'</div>';
        if(it.clothes)params+='<div style="font-size:12px;color:var(--text3)">Одежда: '+it.clothes+'</div>';
        if(it.comment)params+='<div style="font-size:12px;color:var(--orange);font-style:italic">💬 '+it.comment+'</div>';
      });
      if(o.comment)params+='<div style="font-size:12px;color:var(--text3);font-style:italic;margin-top:4px">'+o.comment+'</div>';
      html+='<div class="card" id="c-'+o.id+'" style="margin-bottom:8px;opacity:.85">'
        +'<div style="padding:12px 14px">'
        +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">'
        +'<span class="card-num">'+o.num+'</span>'
        +'<span class="badge b-done">✓ Выполнен</span></div>'
        +'<div style="font-size:14px;font-weight:700">'+orderToyLabel(o)+'</div>'
        +'<div style="font-size:12px;color:var(--text3);margin-top:2px">'+orderQty(o)+' шт. · '+moLbl(o.month)+(o.deliveryDay?' · сдан '+o.deliveryDay+'-го':'')+'</div>'
        +'<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">'+params+'</div>'
        +'</div></div>';
    });
    return html;
  }

  if(!filtered.length){html+='<div class="empty"><div class="empty-icon">🎉</div>Нет заказов</div>';return html;}
  filtered.forEach(function(o){
    var st=STATUSES[o.status]||STATUSES.new;
    // Ship date field for planned status
    var shipDateField='';
    if(o.status==='planned'){
      shipDateField='<div style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:12px;color:var(--text3)">'
        +'<span>📬 Дата отправки:</span>'
        +'<input type="date" value="'+(o.shipDate||'')+'" '
        +'style="padding:3px 6px;border-radius:6px;border:1px solid var(--border2);font-size:12px;background:var(--bg)" '
        +'data-oid="'+o.id+'" onchange="updateShipDate(this.dataset.oid,this.value)">'

    // Блок параметров для мастера по каждой игрушке (без ФИО/телефона/адреса/сумм)
    var mItems=getItems(o);
    var paramsM='<div style="padding:10px 14px;border-top:1px solid var(--border)">'
      +'<div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Параметры</div>';
    mItems.forEach(function(it,idx){
      var gl=it.gender?({boy:'Мальчик',girl:'Девочка'}[it.gender]||it.gender):'';
      paramsM+='<div style="'+(idx?'margin-top:8px;':'')+'font-size:12px;font-weight:700;color:var(--accent);margin-bottom:2px">'+(it.toyType||'Игрушка')+(((parseInt(it.count)||1)>1)?' ×'+it.count:'')+'</div>';
      var line=[];
      if(it.weightG)line.push(it.weightG+'г');
      if(it.heightCm)line.push(it.heightCm+' см');
      if(it.embCount)line.push('вышивка ×'+it.embCount+(it.embText?' «'+it.embText+'»':''));
      if(line.length)paramsM+='<div style="font-size:12px;color:var(--text3);margin-bottom:2px">'+line.join(' · ')+'</div>';
      if(gl)paramsM+='<div style="font-size:12px;margin-bottom:2px"><span style="color:var(--text3)">Пол: </span>'+gl+'</div>';
      if(it.clothes)paramsM+='<div style="font-size:12px;margin-bottom:2px"><span style="color:var(--text3)">Одежда: </span>'+it.clothes+'</div>';
      if(it.comment)paramsM+='<div style="font-size:12px;color:var(--orange);font-style:italic;margin-bottom:2px">💬 '+it.comment+'</div>';

    if(o.comment)paramsM+='<div style="font-size:12px;color:var(--text3);font-style:italic;margin-top:6px">'+o.comment+'</div>';
    paramsM+='</div>';
    html+='<div class="card '+(o.urgent?'urgent':'')+'" id="c-'+o.id+'" style="margin-bottom:10px">'

        return allowed.map(function(k){return'<option value="'+k+'"'+(o.status===k?' selected':'')+'>'+(STATUSES[k]||{label:k}).label+'</option>';}).join('');
