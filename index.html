<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Марковка</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f7f7e4;--bg2:#eeedc8;--bg3:#e5e4b0;--card:#ffffff;
  --accent:#635535;--accent2:#8a7a50;--accent-bg:#f0efb1;
  --text1:#3a3020;--text2:#635535;--text3:#b0a882;
  --border:#e8e6cc;--border2:#d8d5b0;
  --green:#2a7a45;--green-bg:#d9f0e3;
  --blue:#3a8fa3;--blue-bg:#daeef5;
  --red:#6e2222;--red-bg:#f5dada;
  --orange:#8a7a30;--orange-bg:#f0efb1;
  --purple:#6b52a0;--purple-bg:#f2eefa;
  --gray:#7a7570;--gray-bg:#f5f2ef;
  --r:10px;--r2:16px;
  --sh:0 1px 8px rgba(60,48,32,.06);
  --sh2:0 4px 20px rgba(60,48,32,.10);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text1);font-size:14px;min-height:100vh;overflow-x:hidden}
.stripe-bar{height:14px;background:repeating-linear-gradient(90deg,#a3cdd9 0,#a3cdd9 28px,#f7f7e4 28px,#f7f7e4 56px)}
#login{min-height:90vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-wrap{width:100%;max-width:340px;padding:32px 20px 20px}
.login-sub{text-align:center;font-size:13px;color:var(--text3);margin-bottom:28px}
#app{display:none;flex-direction:column;min-height:100vh}
.app-header{background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--sh)}
.h-logo{font-family:'Playfair Display',serif;font-style:italic;font-size:19px;color:var(--accent)}
.h-role{font-size:11px;color:#fff;background:var(--blue);padding:3px 10px;border-radius:20px;font-weight:700}
.h-right{display:flex;align-items:center;gap:8px}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:6px;border-radius:8px;line-height:1}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:0;padding:11px 4px;border:none;background:none;font-family:'Nunito',sans-serif;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.main{padding:14px;flex:1;max-width:600px;width:100%;margin:0 auto}
.card{background:var(--card);border-radius:var(--r2);border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden}
.card+.card{margin-top:10px}
.card.urgent{border-left:3px solid var(--red)}
.card-head{padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-num{font-family:'Playfair Display',serif;font-size:14px;color:var(--accent);font-weight:600}
.card-name{font-size:14px;font-weight:600;color:var(--text1);margin-top:1px}
.card-body{padding:10px 14px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cf{display:flex;flex-direction:column;gap:1px}
.cf-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.cf-v{font-size:13px;color:var(--text1);font-weight:500}
.card-foot{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.card-comment{font-size:11px;color:var(--text3);font-style:italic;flex:1}
.badge{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;letter-spacing:.2px}
.b-new{background:#daeef5;color:#3a8fa3}
.b-work{background:#f0efb1;color:#8a7a30}
.b-ready{background:#d9f0e3;color:#2a7a45}
.b-sent{background:#ece8f8;color:#6b52a0}
.b-done{background:#f0f0ec;color:#7a7570}
.b-urgent{background:#f5dada;color:#6e2222}
.b-paid{background:#d9f0e3;color:#2a7a45}
.b-part{background:#f0efb1;color:#8a7a30}
.b-sdek{background:#daeef5;color:#3a8fa3}
.b-inst{background:#fce8f0;color:#b0366a}
.b-wait{background:#daeef5;color:#3a8fa3}
.b-pers{background:#ece8f8;color:#6b52a0}
.b-site{background:#daeef5;color:#3a8fa3}
.b-advance{background:#fff3cd;color:#856404}
.b-postpay{background:#d1ecf1;color:#0c5460}
.st-select{padding:6px 10px;border-radius:8px;border:1px solid var(--border2);font-family:'Nunito',sans-serif;font-size:12px;background:var(--bg);color:var(--text1);cursor:pointer;outline:none}
.btn{padding:9px 18px;border-radius:var(--r);border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--bg2);color:var(--text2);border:1px solid var(--border2)}
.btn-sm{padding:5px 11px;font-size:11px}
.btn-full{width:100%;justify-content:center}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text3)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #f0c0c0}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid #b0dcc0}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--card);font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.search-inp{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--card);font-family:'Nunito',sans-serif;font-size:13px;color:var(--text1);outline:none;flex:1;min-width:120px}
.search-inp:focus{border-color:var(--accent)}
.form-section{background:var(--card);border-radius:var(--r2);border:1px solid var(--border);padding:16px;box-shadow:var(--sh);margin-bottom:12px}
.form-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--text1);margin-bottom:14px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{padding:9px 12px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg);font-family:'Nunito',sans-serif;font-size:13px;color:var(--text1);outline:none;transition:border-color .15s;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:60px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.span2{grid-column:span 2}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:6px 0}
.checkbox-row input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:var(--r2);padding:14px;border:1px solid var(--border);box-shadow:var(--sh)}
.stat-val{font-family:'Playfair Display',serif;font-size:24px;color:var(--accent);font-weight:600}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px}
.alert{padding:10px 12px;border-radius:var(--r);font-size:12px;margin-bottom:8px}
.alert-red{background:var(--red-bg);color:var(--red)}
.alert-orange{background:var(--orange-bg);color:var(--orange)}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.cal-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--text1)}
.cal-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:5px 12px;font-size:14px;cursor:pointer;color:var(--text2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dh{text-align:center;padding:7px 2px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;background:var(--bg2);border-bottom:1px solid var(--border)}
.cal-cell{min-height:60px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:3px;position:relative}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.other{background:var(--bg2)}
.cal-cell.today{background:var(--accent-bg)}
.cal-dn{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:2px}
.cal-cell.today .cal-dn{color:var(--accent)}
.cal-dot{display:block;font-size:9px;padding:1px 4px;border-radius:3px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;font-weight:600}
.cal-month-orders{padding:12px 14px;border-top:1px solid var(--border)}
.cal-mo-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.cal-mo-num{font-weight:700;color:var(--accent);min-width:46px}
.cal-mo-toy{color:var(--text2);flex:1}
.modal-bg{position:fixed;inset:0;background:rgba(30,23,16,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Playfair Display',serif;font-size:17px;margin-bottom:16px}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text1);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:8px}
.section-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;margin-top:4px}
.pay-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;gap:8px}
.week-chip{display:inline-block;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:700;background:var(--blue-bg);color:var(--blue);margin-bottom:3px}
.chip-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}
@media(max-width:400px){.form-grid{grid-template-columns:1fr}.span2{grid-column:span 1}}
.drop-item{padding:7px 10px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--text1);display:flex;align-items:center;gap:6px}
.drop-item:hover{background:var(--bg2)}
.drop-active{background:var(--accent-bg);color:var(--accent);font-weight:600}

.note-item{background:var(--accent-bg);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:12px}
.note-author{font-weight:700;color:var(--accent);margin-right:4px}
.note-date{color:var(--text3);font-size:11px}
.note-text{color:var(--text1);margin-top:2px}
</style>
</head>
<body>

<div class="stripe-bar"></div>
<div id="login">
  <div class="login-wrap">
    <div style="font-family:'Playfair Display',serif;font-style:italic;font-size:42px;color:#635535;text-align:center;margin-bottom:6px">Марковка</div>
    <div style="font-family:'Playfair Display',serif;font-size:26px;color:#635535;text-align:center;margin-bottom:4px"></div>
    <div class="login-sub" style="text-align:center;color:var(--text3);font-size:13px;margin-bottom:28px">новорождённая игрушка</div>
    <div class="fg">
      <label>Пароль</label>
      <input id="login-pass" type="password" placeholder="Введите пароль..." autocomplete="current-password"
        style="font-size:16px;padding:12px 16px"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary btn-full" style="margin-top:4px;padding:13px" onclick="doLogin()">Войти</button>
    <div id="login-error" style="display:none;background:#f5dada;color:#6e2222;border-radius:12px;padding:12px;text-align:center;font-size:13px;margin-top:12px"></div>
  </div>
</div>

<div id="app">
  <div class="stripe-bar"></div>
  <div class="app-header">
    <div class="h-logo">Марковка</div>
    <div class="h-right">
      <span><span class="sync-dot"></span></span>
      <span id="h-user-name" style="font-size:11px;color:var(--text2);font-weight:700"></span>
      <div class="h-role" id="h-role-lbl"></div>
      <div id="h-preview-badge" style="display:none;background:#f5dada;color:#6e2222;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px"></div>
      <button id="btn-switch-role" class="btn-icon" style="display:none;font-size:13px;padding:4px 8px;border:1px solid var(--border2);border-radius:8px" onclick="showRoleSwitcher()">👁</button>
      <button class="btn-icon" onclick="logout()">✕</button>
    </div>
  </div>
  <div class="tabs" id="tabs-bar"></div>
  <div class="main" id="main"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const TOY_EMOJI={'Мишка':'🐻','Мышка':'🐭','Зайка':'🐰','Котик':'🐱'};
function toyEmoji(type){return TOY_EMOJI[type]||'🧸';}
function calcMatCost(o){
  // Себестоимость = сумма по всем игрушкам заказа (Даша 250 руб/кг, Света 400 руб/кг)
  // Архивные заказы могут хранить свою ставку o.varRate (₽/г).
  var rate=(typeof o.varRate==='number'&&o.varRate>0)?o.varRate:null;
  return getItems(o).reduce(function(s,it){return s+calcItemMat(it,o.master,rate);},0);
}
function calcMargin(o){
  var price=orderTotal(o);
  if(!price)return null;
  var mat=calcMatCost(o);
  var masterPay=calcMasterPay(o);
  var sashaPay=Math.round((price-mat)*0.20);
  if(sashaPay<0)sashaPay=0;
  return price-mat-masterPay-sashaPay;
}
const STATUSES={
  new:{label:'Новый',cls:'b-new'},
  work:{label:'В работе',cls:'b-work'},
  ready:{label:'Готов',cls:'b-ready'},
  planned:{label:'Отправка планируется',cls:'b-sdek'},
  sent:{label:'Отправлен',cls:'b-sent'},
  done:{label:'Доставлен',cls:'b-done'},
  archived:{label:'Архив',cls:'b-gray'},
};
const SOURCES={
  waiting:{label:'Лист ожидания',cls:'b-wait'},
  instagram:{label:'Instagram',cls:'b-inst'},
  personal:{label:'Личный',cls:'b-pers'},
  site:{label:'Сайт',cls:'b-site'},
};
const MASTERS=['Даша','Света'];

const ROLE_MAP={
  '461599258': {role:'manager', name:'Александра', label:'COO',    masterName:null},
  '5158981366':{role:'director',name:'Даша',       label:'Руководитель',masterName:null},
  '5273106995':{role:'master',  name:'Света',      label:'Мастер',      masterName:'Света'},
};
const PASSWORDS={
  'sasha2024':   {role:'manager', name:'Александра', label:'COO',    masterName:null},
  'dasha2024':   {role:'director',name:'Даша',       label:'Руководитель',masterName:null},
  'sveta2024':   {role:'master',  name:'Света',      label:'Мастер',      masterName:'Света'},
};
let role=null,masterName=null,tab='list',myTodos=[],fStatus='all',fMonth='all',fMaster='all',fUrgent=false,fSort='date',search='',calDate=new Date(),showArchive=false;
let expandedCards=new Set();
let realRole=null,isPreviewMode=false;
let orders=[],tasks=[];

const OPENROUTER_KEY='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';

const JSONBIN_ID='6a31904fda38895dfecb54fe';
const JSONBIN_KEY='$2a$10$yDV194UbfbUV7DC2XUUd4OHjsLq37DiuNiZKGjUAwWcGjoz3Z3aXO';
const JSONBIN_URL='https://api.jsonbin.io/v3/b/'+JSONBIN_ID;

// ── Параметры синхронизации (оптимизация лимитов JsonBin) ──
const SYNC_INTERVAL=120000;  // интервал автосинхронизации, мс (2 мин)
const IDLE_LIMIT=180000;     // после 3 мин без действий опрос приостанавливается
let lastSyncTime=0;          // время последней успешной синхронизации с JsonBin
let syncInProgress=false;    // защита от одновременных запросов чтения
let cloudLoadOk=false;       // удалось ли хоть раз успешно прочитать облако в этой сессии
let lastActivity=Date.now(); // время последнего действия пользователя
let activityBound=false;     // навешены ли слушатели активности

// Чтение локального кэша
function readCache(){
  try{const d=localStorage.getItem('markovka_data');return d?JSON.parse(d):null;}catch(e){return null;}
}

async function loadData(force){
  // Если данные загружены меньше SYNC_INTERVAL назад — используем локальную копию
  if(!force&&lastSyncTime&&(Date.now()-lastSyncTime)<SYNC_INTERVAL){
    return readCache();
  }
  // Защита от дублирующихся одновременных запросов
  if(syncInProgress)return readCache();
  syncInProgress=true;
  try{
    console.log("JsonBin sync");
    const r=await fetch(JSONBIN_URL+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY,'X-Bin-Meta':'false'}});
    if(!r.ok)throw new Error('fail');
    const data=await r.json();
    lastSyncTime=Date.now();
    cloudLoadOk=true;                       // облако успешно прочитано
    try{localStorage.setItem('markovka_data',JSON.stringify(data));}catch(e){}
    return data;
  }catch(e){
    // ВАЖНО: не выставляем cloudLoadOk — облако недоступно, запись будет заблокирована
    console.warn('Облако недоступно, работаем с локальной копией',e);
    return readCache();
  }finally{
    syncInProgress=false;
  }
}
async function saveData(ords,tsks){
  // ЗАЩИТА ОТ ПОТЕРИ ДАННЫХ: не пишем в облако, пока ни разу его не прочитали.
  // Иначе пустой/тестовый локальный набор может затереть реальные данные в JsonBin.
  if(!cloudLoadOk){
    console.warn('Запись в облако заблокирована: облако ещё не было загружено в этой сессии');
    try{localStorage.setItem('markovka_data',JSON.stringify({orders:ords,tasks:tsks}));}catch(e){}
    toast('⚠️ Нет связи с облаком — изменения сохранены только локально');
    return;
  }
  const payload={orders:ords,tasks:tsks};
  // Локальная копия считается свежей сразу после сохранения — повторное чтение не требуется
  try{localStorage.setItem('markovka_data',JSON.stringify(payload));lastSyncTime=Date.now();}catch(e){}
  try{
    console.log("JsonBin sync");
    const r=await fetch(JSONBIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Meta':'false'},body:JSON.stringify(payload)});
    if(!r.ok)throw new Error('HTTP '+r.status);
  }catch(e){console.warn('save error',e);toast('⚠️ Не удалось сохранить в облако');}
}
async function saveOrders(ords){orders=ords;await saveData(ords,tasks);}
async function saveTasks(tsks){tasks=tsks;await saveData(orders,tsks);}

function uid(){return '_'+Math.random().toString(36).substr(2,9)}
function fmt(n){return(Math.round(n)||0).toLocaleString('ru')+' \u20bd'}

// \u2500\u2500 \u0418\u0413\u0420\u0423\u0428\u041a\u0418 \u0412 \u0417\u0410\u041a\u0410\u0417\u0415 (\u043c\u0443\u043b\u044c\u0442\u0438\u043f\u043e\u0437\u0438\u0446\u0438\u043e\u043d\u043d\u043e\u0441\u0442\u044c) \u2500\u2500
// \u0421\u0442\u0430\u0440\u044b\u0435 \u0437\u0430\u043a\u0430\u0437\u044b (\u0431\u0435\u0437 items) \u0447\u0438\u0442\u0430\u044e\u0442\u0441\u044f \u043a\u0430\u043a \u043e\u0434\u043d\u0430 \u0438\u0433\u0440\u0443\u0448\u043a\u0430 \u0438\u0437 \u043f\u043b\u043e\u0441\u043a\u0438\u0445 \u043f\u043e\u043b\u0435\u0439.
function getItems(o){
  if(o&&Array.isArray(o.items)&&o.items.length)return o.items;
  return [{
    toyType:(o&&(o.toyType||o.toys))||'',
    weightG:parseFloat(o&&(o.weightG||o.weight))||0,
    heightCm:parseFloat(o&&(o.heightCm||o.height))||0,
    embCount:parseInt(o&&o.embCount)||0,
    embText:(o&&o.embText)||'',
    price:parseFloat(o&&o.price)||0,
    gender:(o&&o.gender)||'',
    clothes:(o&&o.clothes)||'',
    count:parseInt(o&&o.count)||1
  }];
}
function orderTotal(o){return getItems(o).reduce(function(s,it){return s+(parseFloat(it.price)||0)*(parseInt(it.count)||1);},0);}
function orderWeight(o){return getItems(o).reduce(function(s,it){return s+(parseFloat(it.weightG)||0)*(parseInt(it.count)||1);},0);}
function orderEmbCount(o){return getItems(o).reduce(function(s,it){return s+(parseInt(it.embCount)||0)*(parseInt(it.count)||1);},0);}
function orderQty(o){return getItems(o).reduce(function(s,it){return s+(parseInt(it.count)||1);},0);}
function orderToyLabel(o){
  var items=getItems(o);
  var parts=items.map(function(it){var c=(parseInt(it.count)||1);return(it.toyType||'\u0438\u0433\u0440\u0443\u0448\u043a\u0430')+(c>1?' \u00d7'+c:'');});
  return parts.filter(Boolean).join(' + ');
}
// \u0421\u0435\u0431\u0435\u0441\u0442\u043e\u0438\u043c\u043e\u0441\u0442\u044c \u043e\u0434\u043d\u043e\u0439 \u043f\u043e\u0437\u0438\u0446\u0438\u0438 (\u0441 \u0443\u0447\u0451\u0442\u043e\u043c \u043a\u043e\u043b-\u0432\u0430)
function calcItemMat(item,master,rate){
  var varPerG=(typeof rate==='number'&&rate>0)?rate:(master==='\u0421\u0432\u0435\u0442\u0430'?0.40:0.25);
  var cnt=parseInt(item.count)||1;
  return (700+(parseFloat(item.weightG)||0)*varPerG)*cnt;
}
// \u0417\u041f \u043c\u0430\u0441\u0442\u0435\u0440\u0430 \u0437\u0430 \u043e\u0434\u043d\u0443 \u043f\u043e\u0437\u0438\u0446\u0438\u044e (\u0441 \u0443\u0447\u0451\u0442\u043e\u043c \u043a\u043e\u043b-\u0432\u0430)
function calcItemMasterPay(item,master){
  var cnt=parseInt(item.count)||1;
  if(master==='\u0421\u0432\u0435\u0442\u0430')return calcZpSveta(item.weightG,item.embCount)*cnt;
  return (2500+(parseInt(item.embCount)||0)*400)*cnt;
}

function maxDay(mv){if(!mv)return 31;const[y,m]=mv.split('-').map(Number);return new Date(y,m,0).getDate();}
function clampDay(dv,mv){const d=parseInt(dv)||0;return d?Math.min(d,maxDay(mv)):0;}
function updateDayMax(mid,did){

async function initTelegramAuth(){
  let attempts=0;
  while(!(window.Telegram&&window.Telegram.WebApp&&window.Telegram.WebApp.initDataUnsafe)&&attempts<20){
    await new Promise(r=>setTimeout(r,150));attempts++;
  }
  const tg=window.Telegram&&window.Telegram.WebApp;
  let tgId=null;
  if(tg){
    try{tg.ready();}catch(e){}
    try{tg.expand();}catch(e){}
    if(tg.initDataUnsafe&&tg.initDataUnsafe.user)tgId=String(tg.initDataUnsafe.user.id);
  }
  if(!tgId){const p=new URLSearchParams(window.location.search);tgId=p.get('dev_uid');}
  if(!tgId){
    document.getElementById('login-sub').textContent='';
    document.getElementById('login-error').style.display='block';
    document.getElementById('login-error').innerHTML='Откройте приложение через Telegram';
    return;
  }
  const ui=ROLE_MAP[tgId];
  if(!ui){
    document.getElementById('login-sub').textContent='';
    document.getElementById('login-error').style.display='block';
    document.getElementById('login-error').innerHTML='Ваш аккаунт не добавлен.<br><small>ID: '+tgId+'</small>';
    return;
  }
  await login(ui.role,ui.name,ui.label,ui.masterName);
}

async function login(r,userName,userLabel,mName){
  role=r;masterName=mName;
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('h-role-lbl').textContent=userLabel;
  document.getElementById('h-user-name').textContent=userName;
  try{sessionStorage.setItem('markovka_role',JSON.stringify({role:r,name:userName,label:userLabel,masterName:mName}));}catch(e){}
  realRole=r;isPreviewMode=false;
  document.getElementById('btn-switch-role').style.display=r==='manager'?'inline-flex':'none';
  document.getElementById('h-preview-badge').style.display='none';
  tab=r==='master'?'master':'list';
  if(r==='master')fStatus='new'; else fStatus='all';
  // 1) Сначала показываем данные из локального кэша (быстрое открытие)
  const cached=readCache();
  if(cached&&Array.isArray(cached.orders)){
    orders=cached.orders;
    tasks=Array.isArray(cached.tasks)?cached.tasks:[];
    renderTabs();renderTab(tab);
  }
  // 2) Затем загружаем актуальные данные из JsonBin
  const data=await loadData(true);
  if(cloudLoadOk&&data&&Array.isArray(data.orders)){
    // Облако прочитано успешно и в нём есть заказы — используем их
    orders=data.orders;
    tasks=Array.isArray(data.tasks)?data.tasks:[];
  }else if(cloudLoadOk){
    // Облако прочитано, но реально пустое — показываем пусто (НИКОГДА не пишем тестовые автоматически)
    orders=[];tasks=[];
  }else{
    // Облако НЕдоступно — работаем с локальным кэшем, ничего не записываем
    orders=(cached&&Array.isArray(cached.orders))?cached.orders:[];
    tasks=(cached&&Array.isArray(cached.tasks))?cached.tasks:[];
    if(!cached)toast('⚠️ Нет связи с облаком — данные не загружены');
  }
  renderTabs();renderTab(tab);
  startSync();
}

let syncTimer=null;
function bumpActivity(){lastActivity=Date.now();}
async function syncFromCloud(){
  if(!role)return;
  const data=await loadData();
  if(data){
    if(JSON.stringify(data.orders)!==JSON.stringify(orders)){orders=data.orders||[];renderTab(tab);}
    if(JSON.stringify(data.tasks)!==JSON.stringify(tasks)){tasks=data.tasks||[];if(tab==='todos')renderTab(tab);else renderTabs();}
  }
}
function setupActivity(){
  if(activityBound)return;activityBound=true;
  ['pointerdown','keydown','touchstart'].forEach(function(ev){
    document.addEventListener(ev,bumpActivity,{passive:true});
  });
  // При возвращении на вкладку/в приложение — освежаем данные один раз
  document.addEventListener('visibilitychange',function(){if(!document.hidden){bumpActivity();syncFromCloud();}});
  window.addEventListener('focus',function(){bumpActivity();syncFromCloud();});
}
function startSync(){
  setupActivity();
  if(syncTimer)clearInterval(syncTimer);
  syncTimer=setInterval(function(){
    if(document.hidden)return;                          // вкладка не на экране — не опрашиваем
    if(Date.now()-lastActivity>IDLE_LIMIT)return;       // нет действий 3+ мин — пауза (экономия запросов)
    syncFromCloud();
  },SYNC_INTERVAL);
}

function moLbl(m){if(!m)return'';const[y,mo]=m.split('-');return new Date(y,mo-1).toLocaleString('ru',{month:'long',year:'numeric'});}

function getFilteredOrders(){
  var statusOrder={new:0,work:1,ready:2,sent:3,done:4};
  return orders.filter(function(o){
    if(fStatus!=='all'&&o.status!==fStatus)return false;
    if(fUrgent&&!o.urgent)return false;
    if(fMonth!=='all'&&o.month!==fMonth)return false;
    if(fMaster!=='all'&&o.master!==fMaster)return false;
    if(search){var q=search.toLowerCase();if(!o.num.toLowerCase().includes(q)&&!(o.client||'').toLowerCase().includes(q)&&!(o.toys||'').toLowerCase().includes(q))return false;}
    return true;
  }).sort(function(a,b){
    if(fSort==='date')return b.created-a.created;
    if(fSort==='deadline'){var da=a.deliveryDay||99,db=b.deliveryDay||99;return da-db;}
    if(fSort==='status')return (statusOrder[a.status]||0)-(statusOrder[b.status]||0);
    if(fSort==='margin'){var ma=calcMargin(a)||0,mb=calcMargin(b)||0;return mb-ma;}
    return b.created-a.created;
  });
}

    +'<div class="drop-item'+(fMaster==='all'?' drop-active':'')+'" data-act="master" data-val="all">Все мастера</div>';

    +'<button class="chip" data-drop="drop-sort" style="display:inline-flex;align-items:center;gap:4px">'+sortLabels[fSort]+' ↕</button>'

async function addNote(orderId){
  var inp=document.getElementById('note-inp-'+orderId);
  if(!inp)return;
  var text=inp.value.trim();
  if(!text){toast('Введите текст заметки');return;}
  var o=orders.find(function(x){return x.id===orderId;});
  if(!o)return;
  if(!o.notes)o.notes=[];
  var authorName=role==='manager'?'Александра':'Даша';
  o.notes.push({text:text,author:authorName,ts:Date.now()});
  await saveOrders(orders);
  inp.value='';
  renderTab(tab);
  toast('Заметка добавлена');
}
function notesBlock(o){

function toggleNotes(oid){
  var body=document.getElementById('notes-body-'+oid);
  var arr=document.getElementById('narr-'+oid);
  if(!body)return;
  var isOpen=body.style.display!=='none';
  body.style.display=isOpen?'none':'block';
  if(arr)arr.textContent=isOpen?'⌄':'⌃';
}
function toggleCard(id){
  var det=document.getElementById('det-'+id);
  var arr=document.getElementById('arr-'+id);
  if(!det)return;
  var isOpen=det.style.display!=='none';
  det.style.display=isOpen?'none':'block';
  if(arr)arr.textContent=isOpen?'⌄':'⌃';
  if(isOpen)expandedCards.delete(id);else expandedCards.add(id);
}

  if(canFinance&&o.client)html+='<span style="font-size:13px;font-weight:600;color:var(--text1)">'+o.client+'</span>';
  html+='</div>';
  // Инфо строка
  var info=[];
  info.push(orderToyLabel(o));
  if(wt)info.push(wt+'г');
  if(ht)info.push(ht+' см');
  if(o.master)info.push(o.master);
  info.push(moStr);

  html+='<div style="font-size:12px;color:var(--text3);margin-top:3px">'+info.join(' · ')+'</div>';
  html+='</div>';

  html+='<div style="display:flex;align-items:center;gap:4px;flex-shrink:0">'+noteInd+'<div id="arr-'+o.id+'" style="font-size:20px;color:var(--text3);line-height:1">'+(isExpanded?'⌃':'⌄')+'</div></div>';

    if(margin!==null){

  oItems.forEach(function(it,idx){

    if(it.weightG)html+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text3)">Вес: </span>'+it.weightG+' г</div>';
    if(it.heightCm)html+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text3)">Рост: </span>'+it.heightCm+' см</div>';
    if(oItems.length===1)html+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text3)">Кол-во: </span>'+(it.count||1)+' шт.</div>';
    if(it.embCount)html+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text3)">Вышивка: </span>×'+it.embCount+(it.embText?' «'+it.embText+'»':'')+'</div>';
    if(it.gender){var gLbl={boy:'Мальчик',girl:'Девочка'}[it.gender]||it.gender;html+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text3)">Пол: </span>'+gLbl+'</div>';}
    if(it.clothes)html+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text3)">Одежда: </span>'+it.clothes+'</div>';
    if(canFinance&&it.price)html+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text3)">Цена: </span>'+fmt((parseFloat(it.price)||0)*(parseInt(it.count)||1))+'</div>';

  if(canFinance){
    html+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text3)">Цена: </span><b>'+fmt(oPrice)+'</b></div>';
    html+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text3)">Предоплата: </span><span style="color:'+(paid?'var(--green)':'var(--orange)')+'">'+fmt(o.prepaid)+'</span></div>';
    html+='<div style="font-size:12px;margin-bottom:4px"><span style="color:var(--text3)">Остаток: </span><span style="color:'+(paid?'var(--text3)':'var(--red)')+'">'+fmt(rest)+'</span></div>';
    if(margin!==null)html+='<div style="font-size:12px;margin-top:4px"><span style="color:var(--text3)">Маржа: </span><b style="color:'+(margin>0?'var(--green)':'var(--red)')+'">'+fmt(margin)+'</b></div>';
  }else{
    html+=paid?'<span style="color:var(--green);font-size:12px">✓ Полностью оплачен</span>'
      :(o.prepaid>0?'<span style="color:var(--orange);font-size:12px">Частичная оплата</span>'
      :'<span style="color:var(--red);font-size:12px">Без предоплаты</span>');
  }
  html+='</div></div>';

  if(canFinance){

    var trackNum=o.sdekNum||'';
    html+='<div style="padding:12px 16px;border-bottom:1px solid var(--border)">';
    html+='<div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Данные для СДЭК</div>';
    if(!isSent){
      [['Имя',cS],['Телефон',pS],['Адрес',aS]].forEach(function(row){
        if(!row[1])return;
        html+='<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px">'
          +'<span style="font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+row[1]+'</span>'
          +'<button class="btn btn-sm btn-ghost" style="font-size:10px;flex-shrink:0" data-val="'+row[1]+'" onclick="copyField(this.dataset.val,this)">Копировать</button></div>';
      });
      html+='<div style="display:flex;align-items:center;gap:8px;margin-top:4px">'
        +'<input type="text" placeholder="Номер накладной СДЭК" value="'+trackNum+'" '
        +'style="flex:1;padding:7px 10px;border-radius:8px;border:1.5px solid var(--border2);font-size:12px;background:var(--bg)" '

        +'<button class="btn btn-sm btn-primary" style="font-size:11px" data-val="'+msg.replace(/"/g,'&quot;')+'" onclick="copyField(this.dataset.val,this)">Скопировать сообщение</button>';

  }
  html+='</div>';

  html+='</div></div>';
  html+=notesBlock(o);
  return html;
}


async function setStatus(id,val){
  var o=orders.find(function(x){return x.id===id;});
  if(!o)return;
  o.status=val;
  if(val==='sent'){o.closedAt=Date.now();}
  await saveOrders(orders);
  renderTab(tab);
  toast('Статус: '+(STATUSES[val]||{label:val}).label);
}
async function markSdek(id){
  const o=orders.find(function(x){return x.id===id;});
  if(o){o.sdek=true;await saveOrders(orders);renderTab(tab);toast('СДЭК отмечен');}
}
async function saveSdekNum(id,val){
  var o=orders.find(function(x){return x.id===id;});
  if(!o)return;
  o.sdekNum=val.trim();
  o.sdek=!!val.trim();
  await saveOrders(orders);
  renderTab(tab);
  toast('Номер накладной сохранён');
}
async function delOrder(id){
  if(!confirm('Удалить заказ?'))return;
  orders=orders.filter(function(x){return x.id!==id;});
  await saveOrders(orders);renderTab(tab);toast('Заказ удалён');
}
function jumpTo(id){
  fStatus='all';fMonth='all';search='';renderTab('list');
  setTimeout(function(){
    const el=document.getElementById('c-'+id);
    if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='2px solid var(--accent)';setTimeout(function(){el.style.outline='';},2000);}
  },80);
}

function tplCalendar(isMasterView){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  const moStr=new Date(y,m).toLocaleString('ru',{month:'long',year:'numeric'});
  const first=new Date(y,m,1).getDay();
  const start=first===0?6:first-1;
  const days=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  const today=new Date();
  const moKey=y+'-'+String(m+1).padStart(2,'0');
  const allForMonth=orders.filter(function(o){return o.month===moKey;});
  const moOrders=isMasterView?allForMonth.filter(function(o){return o.master===masterName;}):allForMonth;
  const colors={new:'#3a8fa3',work:'#8a7a30',ready:'#2a7a45',sent:'#6b52a0',done:'#7a7570'};
  const tabId=isMasterView?'cal-master':'calendar';

  let cells='';
  for(let i=0;i<start;i++)cells+='<div class="cal-cell other"><span class="cal-dn">'+(prevDays-start+i+1)+'</span></div>';
  for(let d=1;d<=days;d++){
    const isT=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    const dayOs=moOrders.filter(function(o){return(o.deliveryDay||0)===d;});
    let dots=dayOs.map(function(o){
      const c=colors[o.status]||colors.work;
      return '<span class="cal-dot" style="background:'+c+'22;color:'+c+'" onclick="jumpTo(\''+o.id+'\')">'+o.num+'</span>';
    }).join('');
    cells+='<div class="cal-cell'+(isT?' today':'')+'"><span class="cal-dn">'+d+'</span>'+dots+'</div>';
  }
  const rem=(start+days)%7;
  for(let i=1;i<=(rem?7-rem:0);i++)cells+='<div class="cal-cell other"><span class="cal-dn">'+i+'</span></div>';

  let moRows='';
  if(moOrders.length===0){
    moRows='<div style="padding:12px;text-align:center;font-size:13px;color:var(--text3)">Нет заказов</div>';
  }else{
    moOrders.forEach(function(o){
      const st=STATUSES[o.status]||STATUSES.new;
      moRows+='<div class="cal-mo-row">'
        +'<span class="cal-mo-num">'+o.num+'</span>'
        +'<span class="cal-mo-toy">'+o.toys+(o.urgent?' ⚡':'')+(o.deliveryDay?' · '+o.deliveryDay+'-го':'')+'</span>'
        +'<span class="badge '+st.cls+'" style="font-size:9px">'+st.label+'</span>'
        +'<span style="font-size:11px;color:var(--text3)">'+o.master+'</span>'
        +'</div>';
    });
  }

  let weekSummary='';
  if(isMasterView){
    const weeksMap={};
    moOrders.forEach(function(o){
      if(!o.deliveryDay)return;
      const wk=Math.ceil(o.deliveryDay/7);
      if(!weeksMap[wk])weeksMap[wk]=0;
      weeksMap[wk]++;
    });
    const wkeys=Object.keys(weeksMap).sort();
    if(wkeys.length){
      weekSummary='<div style="padding:10px 14px;border-top:1px solid var(--border)">'
        +'<div class="section-lbl">Нагрузка по неделям</div>';
      wkeys.forEach(function(wk){
        const cnt=weeksMap[wk];
        const load=cnt>=4?'🔴 много':cnt>=2?'🟡 средне':'🟢 свободно';
        weekSummary+='<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)">'
          +'<span style="font-weight:700;color:var(--text2)">Неделя '+wk+'</span>'
          +'<span style="color:var(--text3)">'+cnt+' заказов</span>'
          +'<span>'+load+'</span>'
          +'</div>';
      });
      weekSummary+='</div>';
    }
  }

  return '<div class="card" style="margin-bottom:12px">'
    +'<div class="cal-header">'
    +'<button class="cal-btn" onclick="calNav(-1,\''+tabId+'\')">←</button>'
    +'<div class="cal-title" style="text-transform:capitalize">'+moStr+'</div>'
    +'<button class="cal-btn" onclick="calNav(1,\''+tabId+'\')">→</button>'
    +'</div>'
    +'<div class="cal-grid">'
    +['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(function(d){return'<div class="cal-dh">'+d+'</div>';}).join('')
    +cells
    +'</div>'
    +'<div class="cal-month-orders">'
    +'<div class="section-lbl">Заказов в месяце — '+moOrders.length+'</div>'
    +moRows
    +'</div>'
    +weekSummary
    +'</div>';
}

async function parseOrderWithAI(){
  var text=document.getElementById('ai-input').value.trim();
  if(!text){toast('Вставьте текст сообщения');return;}
  var btn=document.getElementById('ai-btn');
  btn.disabled=true;btn.textContent='Анализирую...';
  var currentYearMonth = new Date().getFullYear();
  var prompt='Ты помощник для магазина игрушек Марковка. Текущий год: '+currentYearMonth+'. Извлеки данные о заказе из сообщения и верни ТОЛЬКО JSON без пояснений и без markdown. В одном заказе может быть НЕСКОЛЬКО игрушек — собери их все в массив "items". Поля клиента/заказа — общие. Формат:\n'
    +'{\n'
    +'  "orderNum": "номер заказа если упоминается (например М-015) или пустая строка",\n'
    +'  "client": "имя клиента или пустая строка",\n'
    +'  "phone": "телефон или пустая строка",\n'
    +'  "address": "город и адрес или пустая строка",\n'
    +'  "prepaid": число или null,\n'
    +'  "urgent": true или false,\n'
    +'  "source": "whatsapp, telegram или max — угадай по контексту или оставь whatsapp",\n'
    +'  "comment": "общие пожелания к заказу КРОМЕ одежды и вышивки, или пустая строка",\n'
    +'  "master": "Даша или Света или пустая строка",\n'
    +'  "month": "месяц производства в формате YYYY-MM, определи из текста (к августу = '+currentYearMonth+'-08, в сентябре = '+currentYearMonth+'-09 и т.д.) или пустая строка если не упоминается",\n'
    +'  "items": [ {\n'
    +'    "toyType": "один из: Мишка, Мышка, Зайка, Котик",\n'
    +'    "weightG": число или null,\n'
    +'    "heightCm": число или null,\n'
    +'    "count": число или 1,\n'
    +'    "price": число или null,\n'
    +'    "embCount": число вышивок или 0,\n'
    +'    "embText": "что именно вышить (имя, дата) или пустая строка",\n'
    +'    "clothes": "одежда — Ромпер, шортики, воротничок с их номерами/размерами/цветом, или пустая строка",\n'
    +'    "gender": "boy, girl или пустая строка — определи по контексту (мальчик/сын/он/его = boy, девочка/дочь/она/её = girl)",\n'
    +'    "comment": "важные детали именно по этой игрушке (например: шкурка потемнее, особый оттенок) или пустая строка"\n'
    +'  } ]\n'
    +'}\nЕсли игрушка одна — в массиве items будет один элемент.\n\nСообщение:\n'+text;
  try{
    var r=await fetch('https://openrouter.ai/api/v1/chat/completions',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+OPENROUTER_KEY,
        'HTTP-Referer':'https://markovka.netlify.app',
        'X-Title':'Markovka'
      },
      body:JSON.stringify({
        model:'google/gemini-2.5-flash',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    if(!r.ok){var errData=await r.json();throw new Error('HTTP '+r.status+': '+(errData.error&&errData.error.message||''));}
    var data=await r.json();
    var raw=data.choices[0].message.content.trim();
    raw=raw.replace(/```json|```/g,'').trim();
    var parsed=JSON.parse(raw);
    // Поля заказа
    if(parsed.orderNum)document.getElementById('fnum').value=parsed.orderNum;
    if(parsed.client)document.getElementById('fc').value=parsed.client;
    if(parsed.phone)document.getElementById('fp').value=parsed.phone;
    if(parsed.address)document.getElementById('fa').value=parsed.address;
    if(parsed.prepaid)document.getElementById('fpre').value=parsed.prepaid;
    if(parsed.urgent)document.getElementById('fur').checked=true;
    if(parsed.source){var ss=document.getElementById('fsrc');for(var i=0;i<ss.options.length;i++){if(ss.options[i].value===parsed.source){ss.selectedIndex=i;break;}}}
    if(parsed.comment)document.getElementById('fcm').value=parsed.comment;
    if(parsed.master){var ms=document.getElementById('fmas');for(var i=0;i<ms.options.length;i++){if(ms.options[i].value===parsed.master){ms.selectedIndex=i;break;}}}
    if(parsed.month){document.getElementById('fm').value=parsed.month;updateDayMax('fm','fdd');}
    // Игрушки — пересобираем контейнер
    var aiItems=Array.isArray(parsed.items)&&parsed.items.length?parsed.items:[{
      toyType:parsed.toyType,weightG:parsed.weightG,heightCm:parsed.heightCm,count:parsed.count,
      price:parsed.price,embCount:parsed.embCount,embText:parsed.embText,clothes:parsed.clothes,gender:parsed.gender,comment:parsed.itemComment
    }];
    var cont=document.getElementById('items-container');
    if(cont){
      cont.innerHTML=aiItems.map(function(it){return itemBlockHtml({
        toyType:it.toyType||'',weightG:it.weightG||'',heightCm:it.heightCm||'',count:it.count||1,
        price:it.price||'',embCount:it.embCount||0,embText:it.embText||'',clothes:it.clothes||'',gender:it.gender||'',comment:it.comment||''
      });}).join('');
      renumberItems('items-container');
      previewMasterPay();
    }
    document.getElementById('ai-block').style.display='none';
    document.getElementById('ai-input').value='';
    toast('✅ Данные заполнены ('+aiItems.length+' игр.) — проверь и сохрани');
  }catch(e){
    toast('⚠️ Ошибка: '+e.message);
    console.error('Gemini error:', e);
  }finally{
    btn.disabled=false;btn.textContent='✨ Заполнить автоматически';
  }
}

function toggleItemEmb(cb){
  var block=cb.closest('.item-block');
  var row=block&&block.querySelector('.it-emb-row');
  if(row)row.style.display=cb.checked?'block':'none';
  previewMasterPay();
}
function addItemBlock(containerId){
  var c=document.getElementById(containerId||'items-container');
  if(!c)return;
  c.insertAdjacentHTML('beforeend',itemBlockHtml({}));
  renumberItems(c.id);previewMasterPay();
}
function removeItemBlock(btn){
  var block=btn.closest('.item-block');
  var c=block.parentElement;
  if(c.querySelectorAll('.item-block').length<=1){toast('В заказе должна быть хотя бы одна игрушка');return;}
  block.remove();
  renumberItems(c.id);previewMasterPay();
}
function renumberItems(containerId){
  var blocks=document.querySelectorAll('#'+containerId+' .item-block');
  blocks.forEach(function(b,i){
    var t=b.querySelector('.item-title');
    if(t)t.textContent='🧸 Игрушка '+(i+1);
    var rm=b.querySelector('.it-remove');
    if(rm)rm.style.display=blocks.length>1?'block':'none';
  });
}
function readItemsFrom(containerId){
  var blocks=document.querySelectorAll('#'+containerId+' .item-block');
  var items=[];
  blocks.forEach(function(b){
    var embOn=b.querySelector('.it-emb').checked;
    items.push({
      toyType:b.querySelector('.it-toy').value,
      count:parseInt(b.querySelector('.it-count').value)||1,
      weightG:parseFloat(b.querySelector('.it-wg').value)||0,
      heightCm:parseFloat(b.querySelector('.it-hcm').value)||0,
      price:parseFloat(b.querySelector('.it-price').value)||0,
      gender:b.querySelector('.it-gender').value,
      clothes:b.querySelector('.it-clothes').value.trim(),
      embCount:embOn?(parseInt(b.querySelector('.it-embc').value)||1):0,
      embText:embOn?b.querySelector('.it-embtext').value.trim():'',
      comment:(b.querySelector('.it-comment')?b.querySelector('.it-comment').value.trim():'')
    });
  });
  return items;
}

function toggleEmbCount(cbId,rowId){
  var cb=document.getElementById(cbId);
  var row=document.getElementById(rowId);
  if(cb&&row)row.style.display=cb.checked?'block':'none';
  previewMasterPay();
}
function previewMasterPay(){
  var mEl=document.getElementById('fmas');
  var prev=document.getElementById('master-pay-preview');
  if(!mEl||!prev)return;
  var master=mEl.value;
  var items=readItemsFrom('items-container');
  if(!items.length){prev.style.display='none';return;}
  var hasData=items.some(function(it){return it.weightG||it.price;});
  if(!hasData){prev.style.display='none';return;}
  var tmpO={master:master,items:items};
  var total=calcMasterPay(tmpO);
  var adv=calcAdvance(tmpO);
  var post=calcPostpay(tmpO);
  var price=orderTotal(tmpO);
  prev.style.display='block';
  var head='<b>Сумма заказа:</b> '+fmt(price)+' · игрушек: '+items.length+'<br>';
  if(master==='Света'){
    prev.innerHTML=head+'<b>ЗП Светы:</b> '+fmt(total)+'<br>'
      +'<span style="color:var(--text3)">Аванс (30%): '+fmt(adv)+' · Доплата (70%): '+fmt(post)+'</span>';
  }else{
    prev.innerHTML=head+'<b>ЗП Даши:</b> '+fmt(total)+'<br>'
      +'<span style="color:var(--text3)">Выплачивается раз в неделю</span>';
  }
}
async function addOrder(){
  const c=v('fc'),num=v('fnum');
  if(!num){toast('Укажите номер заказа');return;}
  if(!c){toast('Укажите имя клиента');return;}
  if(orders.find(function(o){return o.num===num;})){toast('Такой номер уже существует');return;}
  const items=readItemsFrom('items-container');
  if(!items.length||!items.some(function(it){return it.toyType;})){toast('Добавьте хотя бы одну игрушку');return;}
  const first=items[0]||{};
  const o={
    id:uid(),num:num,client:c,phone:v('fp'),address:v('fa'),
    items:items,
    // Агрегаты для совместимости/отображения
    toyType:orderToyLabel({items:items}),toys:orderToyLabel({items:items}),
    weightG:orderWeight({items:items}),heightCm:parseFloat(first.heightCm)||0,
    embCount:orderEmbCount({items:items}),embText:first.embText||'',
    count:orderQty({items:items}),
    price:orderTotal({items:items}),
    gender:first.gender||'',clothes:first.clothes||'',
    prepaid:parseFloat(v('fpre'))||0,advancePaid:false,postpayPaid:false,
    month:v('fm'),master:v('fmas'),source:v('fsrc'),status:v('fst'),
    deliveryDay:clampDay(v('fdd'),v('fm')),
    urgent:document.getElementById('fur').checked,
    sdek:document.getElementById('fsd').checked,
    comment:v('fcm'),
    notes:[],created:Date.now()
  };
  orders.unshift(o);
  await saveOrders(orders);
  toast('Заказ '+o.num+' добавлен');
  renderTab('list');
}

function openEdit(id){
  const o=orders.find(function(x){return x.id===id;});

// ── ФИНАНСОВЫЕ КОНСТАНТЫ ──
const FIXED_COST = 700;           // фиксированные расходы на игрушку
const VAR_COST_DASHA = 0.25;      // переменные расходы за грамм — Даша (250 руб/кг)
const VAR_COST_SVETA = 0.40;      // переменные расходы за грамм — Света (400 руб/кг)
const SASHA_PCT = 0.20;      // % Александры

function calcCosts(o){
  // Считаем по каждой игрушке отдельно, затем суммируем
  // Архивные заказы могут хранить свою ставку расхода по весу (o.varRate, ₽/г).
  // Новые заказы поля не имеют — считаются по текущим ставкам (250/400 ₽/кг).
  var varPerG = (typeof o.varRate==='number' && o.varRate>0)
    ? o.varRate
    : (o.master==='Света' ? VAR_COST_SVETA : VAR_COST_DASHA);
  var items = getItems(o);
  var fixed=0, variable=0, master=0;
  items.forEach(function(it){
    var cnt=parseInt(it.count)||1;
    fixed    += FIXED_COST * cnt;
    variable += (parseFloat(it.weightG)||0) * varPerG * cnt;
    master   += calcItemMasterPay(it, o.master);
  });
  var materials = fixed + variable;
  var price = orderTotal(o);
  var sasha  = Math.round((price - materials) * SASHA_PCT);
  if(sasha < 0) sasha = 0;
  var profit = price - materials - sasha - master;
  return {fixed:fixed, variable:variable, materials:materials, master:master, sasha:sasha, profit:profit};
}

// Период для аналитики
var statsPeriod = 'month'; // 'week' | 'month' | 'all'
var statsMonthKey = '';    // для кастомного месяца

function getWeekRange(){
  var now=new Date();
  var day=now.getDay()||7;
  var mon=new Date(now); mon.setDate(now.getDate()-day+1); mon.setHours(0,0,0,0);
  var sun=new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
  return{start:mon,end:sun};
}

function filterByPeriod(ords, period, customMonth){
  var now=new Date();
  if(period==='week'){
    var r=getWeekRange();
    return ords.filter(function(o){var d=new Date(o.created);return d>=r.start&&d<=r.end;});
  }
  if(period==='month'){
    var curMo=customMonth||(now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'));
    return ords.filter(function(o){return(o.month||'')=== curMo;});
  }
  return ords; // all
}

  var day=now.getDay()||7;
  var mon=new Date(now); mon.setDate(now.getDate()-day+1+offset*7); mon.setHours(0,0,0,0);
  var sun=new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
  return{start:mon,end:sun};
}

function analyticsWeekNav(d){analyticsWeekOffset+=d;renderTab('analytics');}
function analyticsNastyaInput(val){nastyaPay=parseInt(val)||0;renderTab('analytics');}

function getClosedWeekOrders(){
  var r=getAnalyticsWeekRange(analyticsWeekOffset);
  return orders.filter(function(o){
    if(!o.postpayPaid) return false;
    var st=o.status;
    if(st!=='ready'&&st!=='planned'&&st!=='sent'&&st!=='done') return false;
    // Используем дату последнего обновления или дату создания
    var d=new Date(o.closedAt||o.updated||o.created);
    return d>=r.start&&d<=r.end;
  });
}

function renderDonutChart(data,total){
  var size=180;var cx=size/2;var cy=size/2;var r=62;var strokeW=26;
  var sum=data.reduce(function(s,d){return s+d.val;},0);
  if(!sum)return'';
  var paths='';var offset=0;var circumference=2*Math.PI*r;
  // Legend
  var legend='<div style="display:flex;flex-direction:column;gap:6px;justify-content:center;flex:1">';
  data.forEach(function(d){
    var dashArr=(d.val/sum)*circumference;
    var dashOff=-(offset/sum)*circumference;
    paths+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" '
      +'stroke="'+d.color+'" stroke-width="'+strokeW+'" '
      +'stroke-dasharray="'+dashArr+' '+circumference+'" '
      +'stroke-dashoffset="'+dashOff+'" '
      +'transform="rotate(-90 '+cx+' '+cy+')">'
      +'</circle>';
    offset+=d.val;
    var pctLbl=total>0?Math.round(d.val/total*100)+'%':'';
    legend+='<div style="display:flex;align-items:center;gap:6px;font-size:11px">'
      +'<div style="width:10px;height:10px;border-radius:3px;background:'+d.color+';flex-shrink:0"></div>'
      +'<span style="color:var(--text2);flex:1">'+d.label+'</span>'
      +'<span style="font-weight:700;color:var(--text1)">'+pctLbl+'</span>'
      +'</div>';
  });
  legend+='</div>';
  return '<div style="background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:12px;box-shadow:var(--sh)">'
    +'<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">Распределение средств</div>'
    +'<div style="display:flex;align-items:center;gap:16px">'
    +'<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" style="flex-shrink:0">'+paths+'</svg>'
    +legend
    +'</div>'
    +'</div>';
}

async function downloadAnalyticsPng(){
  var el=document.getElementById('analytics-report');
  if(!el){toast('Нет данных');return;}
  if(typeof html2canvas==='undefined'){toast('html2canvas не загружен');return;}
  toast('Создаём изображение...');
  var r=getAnalyticsWeekRange(analyticsWeekOffset);
  var name='analytics_'+r.start.toISOString().slice(0,10)+'.png';
  try{
    var canvas=await html2canvas(el,{backgroundColor:'#f7f7e4',scale:2,useCORS:true,logging:false});
    var a=document.createElement('a');
    a.href=canvas.toDataURL('image/png');
    a.download=name;a.click();
    toast('PNG сохранён ✓');
  }catch(e){toast('Ошибка экспорта: '+e.message);}
}

function exportAnalyticsCsv(){
  var r=getAnalyticsWeekRange(analyticsWeekOffset);
  var closed=getClosedWeekOrders();
  if(!closed.length){toast('Нет закрытых заказов');return;}
  var rows=[['Номер','Клиент','Мастер','Статус','Цена','Вес (г)','Кол-во','Вышивка','ЗП мастера','Материалы','Прибыль','Месяц']];
  closed.forEach(function(o){
    var c=calcCosts(o);
    rows.push([o.num,o.client||'',o.master||'',o.status||'',o.price||0,o.weightG||0,o.count||1,o.embCount||0,c.master,c.materials,c.profit,o.month||'']);
  });
  var csv=rows.map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var bom='﻿';
  var blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='orders_week_'+r.start.toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV сохранён ✓');
}

function calcZpSveta(weightG,embCount){
  var w=parseFloat(weightG)||0;
  var base;
  if(w<1900)base=2300;
  else if(w<2500)base=2500;
  else if(w<3000)base=2700;
  else if(w<3400)base=2800;
  else if(w<3800)base=2900;
  else if(w<4400)base=3100;
  else if(w<=5500)base=3400;
  else base=Math.floor((1800+w*0.3)/100)*100;
  return base+(parseInt(embCount)||0)*400;
}
function calcMasterPay(o){
  // Сумма ЗП по всем игрушкам заказа
  return getItems(o).reduce(function(s,it){return s+calcItemMasterPay(it,o.master);},0);
}
function calcAdvance(o){
  if(o.master==='Света') return Math.round(calcMasterPay(o)*0.3);
  return 0;
}
function calcPostpay(o){
  if(o.master==='Света') return calcMasterPay(o)-calcAdvance(o);
  return calcMasterPay(o);
}

function copyField(val,btn){
  navigator.clipboard.writeText(val).then(function(){
    var orig=btn.textContent;
    btn.textContent='✓ Скопировано';
    btn.style.color='var(--green)';
    setTimeout(function(){btn.textContent=orig;btn.style.color='';},1500);
  }).catch(function(){
    // fallback
    var ta=document.createElement('textarea');
    ta.value=val;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    var orig=btn.textContent;
    btn.textContent='✓ Скопировано';
    setTimeout(function(){btn.textContent=orig;},1500);
  });
}

function tplSvetaFinance(){
  var now=new Date();
  var sf=window.svetaPeriod||'week';
  var sfFrom=window.svetaFrom||'';
  var sfTo=window.svetaTo||'';

  function inPeriod(o){
    var d=new Date(o.created);
    if(sf==='week'){
      var ws=new Date(now);ws.setDate(now.getDate()-now.getDay()+1);ws.setHours(0,0,0,0);
      return d>=ws;
    }
    if(sf==='custom'&&sfFrom&&sfTo){
      var df=new Date(sfFrom),dt=new Date(sfTo);dt.setHours(23,59,59);
      return d>=df&&d<=dt;
    }
    return true;
  }

  var myOrders=orders.filter(function(o){return o.master==='Света'&&inPeriod(o);});
  var totalGot=myOrders.reduce(function(s,o){
    return s+(o.advancePaid?calcAdvance(o):0)+(o.postpayPaid?calcPostpay(o):0);
  },0);
  var totalPending=myOrders.reduce(function(s,o){
    return s+(!o.advancePaid?calcAdvance(o):0)+(!o.postpayPaid?calcPostpay(o):0);
  },0);
  var inWork=myOrders.filter(function(o){return o.status==='work'||o.status==='new';}).length;
  var done=myOrders.filter(function(o){return o.advancePaid&&o.postpayPaid;}).length;

  var html='<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">';
  [{id:'week',label:'Неделя'},{id:'all',label:'Всё время'},{id:'custom',label:'Период'}].forEach(function(p){
    var isAct=sf===p.id;
    html+='<button class="chip'+(isAct?' active':'')+'" onclick="window.svetaPeriod=\''+p.id+'\';renderTab(\'finance\')" style="'+(isAct?'background:var(--accent);color:#fff':'')+'">'+p.label+'</button>';
  });
  html+='</div>';

  if(sf==='custom'){
    html+='<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">'
      +'<div class="fg" style="margin:0;flex:1"><label>С</label><input type="date" value="'+sfFrom+'" oninput="window.svetaFrom=this.value;renderTab(\'finance\')"></div>'
      +'<div class="fg" style="margin:0;flex:1"><label>По</label><input type="date" value="'+sfTo+'" oninput="window.svetaTo=this.value;renderTab(\'finance\')"></div>'
      +'</div>';
  }

  html+='<div class="stats-grid" style="margin-bottom:12px">'
    +'<div class="stat-card"><div class="stat-val" style="color:var(--green)">'+fmt(totalGot)+'</div><div class="stat-lbl">Всего получено</div></div>'
    +'<div class="stat-card"><div class="stat-val" style="color:var(--orange)">'+fmt(totalPending)+'</div><div class="stat-lbl">Ожидается поступлений</div></div>'
    +'</div>';

  html+='<div style="background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:12px;box-shadow:var(--sh)">';
  html+='<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text3)">В работе</span><span style="font-weight:700">'+inWork+' заказов</span></div>';
  html+='<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0"><span style="color:var(--text3)">Полностью закрыто</span><span style="font-weight:700;color:var(--green)">'+done+' заказов</span></div>';
  html+='</div>';

  html+='<div class="section-lbl">История заказов</div>';
  if(!myOrders.length){html+='<div class="empty"><div class="empty-icon">🧸</div>Нет заказов за период</div>';}
  myOrders.slice().sort(function(a,b){return b.created-a.created;}).forEach(function(o){
    var total=calcMasterPay(o),adv=calcAdvance(o),post=calcPostpay(o);
    var wInfo=orderWeight(o)?orderWeight(o)+'г':'—';
    html+='<div style="background:var(--card);border-radius:12px;border:1px solid var(--border);padding:12px;margin-bottom:8px;box-shadow:var(--sh)">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
      +'<span style="font-family:serif;font-size:14px;color:var(--accent);font-weight:600">'+o.num+'</span>'
      +'<span class="badge '+(STATUSES[o.status]||STATUSES.new).cls+'">'+(STATUSES[o.status]||STATUSES.new).label+'</span>'
      +'</div>'
      +'<div style="font-size:12px;color:var(--text3);margin-bottom:8px">'+orderToyLabel(o)+' · '+wInfo+' · '+moLbl(o.month)+'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:12px">'
      +'<div><div style="color:var(--text3)">ЗП итого</div><div style="font-weight:700">'+fmt(total)+'</div></div>'

function tplTasks(){
  // Видимость: личные задачи (to=мое имя) видны только мне; остальное видят только Саша/Даша
  const me=myTaskName();
  const visible=tasks.filter(function(t){
    if(t.to===me) return true; // личные видны только мне
    return role!=='master'; // остальное видят только Саша/Даша
  });
  const open=visible.filter(function(t){return!t.done;}).sort(function(a,b){return b.created-a.created;});
  const done=visible.filter(function(t){return t.done;}).sort(function(a,b){return b.created-a.created;}).slice(0,15);
  // Куда можно назначить задачу
  var toList;
  var other=me==='Александра'?'Даша':(me==='Даша'?'Александра':'Света');
  if(role==='master'){
    toList=[['Мне','Мне (только я вижу)'],['Александра','Александра'],['Даша','Даша']];
  }else{
    toList=[['Мне','Мне (только я вижу)'],[other,other],['Света','Света'],['all','Александра и Даша']];
  }
  // выбранный получатель (по умолчанию — первый допустимый)
  var allowed=toList.map(function(p){return p[0];});
  if(allowed.indexOf(window.taskTo)<0)window.taskTo=allowed[0];
  var chips=toList.map(function(p){
    var c=personPastelColor(p[0]);
    var active=window.taskTo===p[0];
    return '<button type="button" data-to="'+p[0]+'" data-color="'+c+'" onclick="selectTaskTo(this)" '
      +'style="font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;border:1.5px solid '+c+';background:'+(active?c:c+'26')+';color:'+(active?'#fff':c)+'">'+p[1]+'</button>';
  }).join('');

  let html='<div class="form-section" style="margin-bottom:12px;padding:12px 14px">'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">'+chips+'</div>'
    +'<div style="display:flex;gap:8px">'
    +'<input id="task-text" placeholder="Новая задача..." onkeydown="if(event.key===\'Enter\')addTask()" style="flex:1;padding:9px 12px;border-radius:10px;border:1.5px solid var(--border2);font-size:14px;background:var(--bg);font-family:inherit;outline:none">'
    +'<button class="btn btn-primary" onclick="addTask()" style="padding:9px 16px;flex-shrink:0">Добавить</button>'
    +'</div>'
    +'</div>';

  if(open.length===0&&done.length===0){html+='<div class="empty" style="text-align:center;padding:24px 14px;color:var(--text3);font-size:13px">Задач нет</div>';}
  if(open.length>0){
    html+='<div class="section-lbl">Открытые · '+open.length+'</div>';
    open.forEach(function(t){html+=taskCard(t);});
  }
  if(done.length>0){
    html+='<div class="section-lbl" style="margin-top:14px">Выполненные</div>';
    done.forEach(function(t){html+=taskCard(t);});
  }
  return html;
}

function personColor(name){
  return {'Александра':'#6b52a0','Даша':'#8a7a50','Света':'#3a8fa3','all':'#635535'}[name]||'#635535';
}
function personPastelColor(name){
  return {'Мне':'#c9a96a','Александра':'#b89fd0','Даша':'#c5a872','Света':'#8dc6e0','all':'#a89880'}[name]||'#a89880';
}
// Имя текущего пользователя в системе задач
function myTaskName(){return role==='master'?masterName:(role==='manager'?'Александра':'Даша');}
// Кол-во новых задач для меня (не выполненных, не моих, появившихся после последнего просмотра)
function unreadTaskCount(){
  if(!role)return 0;
  var me=myTaskName();
  var seen=0;try{seen=parseInt(localStorage.getItem('tasks_seen_'+me))||0;}catch(e){}
  return tasks.filter(function(t){
    if(t.done||t.from===me)return false;
    var forMe=t.to===me||(t.to==='all'&&role!=='master');
    return forMe&&(t.created>seen);
  }).length;
}
function markTasksSeen(){
  try{localStorage.setItem('tasks_seen_'+myTaskName(),Date.now());}catch(e){}
}
function selectTaskTo(btn){
  window.taskTo=btn.dataset.to;
  var wrap=btn.parentElement;
  wrap.querySelectorAll('button[data-to]').forEach(function(b){
    var c=b.dataset.color,active=b===btn;
    b.style.background=active?c:(c+'14');
    b.style.color=active?'#fff':c;
  });
}
function taskCard(t){
  const me=myTaskName();
  const isPersonal=t.to===me&&t.from===me;
  const canAct=(role==='manager'||role==='director')||(role==='master'&&t.to===masterName)||(isPersonal);
  const dt=new Date(t.created).toLocaleString('ru',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  var toLabel=t.to==='all'?'Александра и Даша':isPersonal?'Мне':t.to;
  const toColor=personColor(t.to);
  // Чекбокс выполнения (можно снять обратно)
  var check=(canAct&&!isPreviewMode)
    ? '<input type="checkbox" '+(t.done?'checked':'')+' onchange="setTaskDone(\''+t.id+'\',this.checked)" style="width:18px;height:18px;margin-top:1px;accent-color:var(--green);cursor:pointer;flex-shrink:0">'
    : '<span style="width:18px;height:18px;flex-shrink:0;border:1.5px solid var(--border2);border-radius:5px;'+(t.done?'background:var(--green);border-color:var(--green)':'')+'"></span>';
  var del=(role!=='master'&&!isPreviewMode)
    ? '<button style="background:none;border:none;color:#c8a0a0;font-size:18px;padding:0 2px;line-height:1;cursor:pointer;flex-shrink:0" onclick="delTask(\''+t.id+'\')">×</button>':'';
  // Ярлычок исполнителя — компактный, как фильтр-чип
  var chip='<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:'+toColor+'1a;color:'+toColor+';border:1px solid '+toColor+'40;white-space:nowrap">'+toLabel+'</span>';
  return '<div class="card" style="margin-bottom:8px;opacity:'+(t.done?'.6':'1')+'">'
    +'<div style="padding:11px 13px;display:flex;align-items:flex-start;gap:10px">'
    +check
    +'<div style="flex:1;min-width:0">'
    +'<div style="font-size:13px;line-height:1.4;'+(t.done?'text-decoration:line-through;color:var(--text3)':'color:var(--text1)')+'">'+t.text+'</div>'
    +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:6px">'
    +chip
    +'<span style="font-size:10px;color:var(--text3)">от '+t.from+' · '+dt+'</span>'
    +'</div>'
    +'</div>'+del
    +'</div></div>';
}

async function addTask(){
  const text=v('task-text');
  if(!text){toast('Напишите задачу');return;}
  const fromName=myTaskName();
  var to=window.taskTo||(role==='master'?'Даша':'Александра');
  if(to==='Мне') to=fromName; // личные задачи — сохраняем с именем текущего
  const t={id:uid(),from:fromName,to:to,text:text,done:false,created:Date.now()};
  tasks.unshift(t);
  await saveTasks(tasks);
  toast('Задача добавлена');renderTab('todos');
}
async function setTaskDone(id,done){
  const t=tasks.find(function(x){return x.id===id;});
  if(t){t.done=!!done;await saveTasks(tasks);renderTab('todos');}
}
async function doneTask(id){
  const t=tasks.find(function(x){return x.id===id;});
  if(t){t.done=true;await saveTasks(tasks);renderTab('todos');}
}
async function delTask(id){
  tasks=tasks.filter(function(x){return x.id!==id;});
  await saveTasks(tasks);renderTab('todos');
}

function v(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function toggleDrop(id){
  document.querySelectorAll('[id^="drop-"]').forEach(function(el){
    if(el.id!==id)el.style.display='none';
  });
  var el=document.getElementById(id);
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}
function closeAllDrops(){
  document.querySelectorAll('[id^="drop-"]').forEach(function(el){el.style.display='none';});
}
document.addEventListener('click',function(e){
  var dropper=e.target.closest('[data-drop]');
  if(dropper){
    var did=dropper.dataset.drop;
    document.querySelectorAll('[id^="drop-"]').forEach(function(el){
      el.style.display=el.id===did?(el.style.display==='none'?'block':'none'):'none';
    });
    return;
  }
  var item=e.target.closest('[data-act]');
  if(item){
    var act=item.dataset.act,val=item.dataset.val;
    if(act==='status-all'){fStatus='all';}
    else if(act==='urgent'){fUrgent=!fUrgent;}
    else if(act==='status'){fStatus=val;}
    else if(act==='month'){fMonth=val;}
    else if(act==='master'){fMaster=val;}
    else if(act==='sort'){fSort=val;}
    else if(act==='mstatus'){fStatus=val;closeAllDrops();renderTab('master');return;}
    else if(act==='mmonth'){fMonth=val;closeAllDrops();renderTab('master');return;}
    closeAllDrops();
    renderTab('list');
    return;
  }
  if(!e.target.closest('.dropdown'))closeAllDrops();
});

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

// Netlify version - password login only
window.addEventListener('load',function(){
  // Check if already logged in via sessionStorage
  const saved=sessionStorage.getItem('markovka_role');
  if(saved){
    try{
      const ui=JSON.parse(saved);
      login(ui.role,ui.name,ui.label,ui.masterName);
    }catch(e){/* ignore */}
  }
});
</script>
