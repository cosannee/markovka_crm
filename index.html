function tplTasks(){
  // Видимость: личные задачи (to=мое имя) видны только мне; остальное видят только Саша/Даша
  const me=myTaskName();
  const visible=tasks.filter(function(t){
    if(t.to===me) return true; // личные видны только мне
    return role!=='master'; // остальное видят только Саша/Даша
  });
  const open=visible.filter(function(t){return!t.done;}).sort(function(a,b){return b.created-a.created;});
  const done=visible.filter(function(t){return t.done;}).sort(function(a,b){return b.created-a.created;}).slice(0,15);
  // Куда можно назначить задачу
  var toList;
  var other=me==='Александра'?'Даша':(me==='Даша'?'Александра':'Света');
  if(role==='master'){
    toList=[['Мне','Мне (только я вижу)'],['Александра','Александра'],['Даша','Даша']];
  }else{
    toList=[['Мне','Мне (только я вижу)'],[other,other],['Света','Света'],['all','Александра и Даша']];
  }
  // выбранный получатель (по умолчанию — первый допустимый)
  var allowed=toList.map(function(p){return p[0];});
  if(allowed.indexOf(window.taskTo)<0)window.taskTo=allowed[0];
  var chips=toList.map(function(p){
    var c=personPastelColor(p[0]);
    var active=window.taskTo===p[0];
    return '<button type="button" data-to="'+p[0]+'" data-color="'+c+'" onclick="selectTaskTo(this)" '
      +'style="font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;border:1.5px solid '+c+';background:'+(active?c:c+'26')+';color:'+(active?'#fff':c)+'">'+p[1]+'</button>';
  }).join('');

  let html='<div class="form-section" style="margin-bottom:12px;padding:12px 14px">'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">'+chips+'</div>'
    +'<div style="display:flex;gap:8px">'
    +'<input id="task-text" placeholder="Новая задача..." onkeydown="if(event.key===\'Enter\')addTask()" style="flex:1;padding:9px 12px;border-radius:10px;border:1.5px solid var(--border2);font-size:14px;background:var(--bg);font-family:inherit;outline:none">'
    +'<button class="btn btn-primary" onclick="addTask()" style="padding:9px 16px;flex-shrink:0">Добавить</button>'
    +'</div>'
    +'</div>';

  if(open.length===0&&done.length===0){html+='<div class="empty" style="text-align:center;padding:24px 14px;color:var(--text3);font-size:13px">Задач нет</div>';}
  if(open.length>0){
    html+='<div class="section-lbl">Открытые · '+open.length+'</div>';
    open.forEach(function(t){html+=taskCard(t);});
  }
  if(done.length>0){
    html+='<div class="section-lbl" style="margin-top:14px">Выполненные</div>';
    done.forEach(function(t){html+=taskCard(t);});
  }
  return html;
}

function personColor(name){
  return {'Александра':'#6b52a0','Даша':'#8a7a50','Света':'#3a8fa3','all':'#635535'}[name]||'#635535';
}
function personPastelColor(name){
  return {'Мне':'#c9a96a','Александра':'#b89fd0','Даша':'#c5a872','Света':'#8dc6e0','all':'#a89880'}[name]||'#a89880';
}
// Имя текущего пользователя в системе задач
function myTaskName(){return role==='master'?masterName:(role==='manager'?'Александра':'Даша');}
// Кол-во новых задач для меня (не выполненных, не моих, появившихся после последнего просмотра)
function unreadTaskCount(){
  if(!role)return 0;
  var me=myTaskName();
  var seen=0;try{seen=parseInt(localStorage.getItem('tasks_seen_'+me))||0;}catch(e){}
  return tasks.filter(function(t){
    if(t.done||t.from===me)return false;
    var forMe=t.to===me||(t.to==='all'&&role!=='master');
    return forMe&&(t.created>seen);
  }).length;
}
function markTasksSeen(){
  try{localStorage.setItem('tasks_seen_'+myTaskName(),Date.now());}catch(e){}
}
function unreadOrderCount(){
  if(!role)return 0;
  var key='orders_seen_'+role+(role==='master'?'_'+masterName:'');
  var seen=0;try{seen=parseInt(localStorage.getItem(key))||0;}catch(e){}
  return orders.filter(function(o){
    if(o.status==='archived'||o.status==='done'||o.status==='sent')return false;
    if(o.status!=='new')return false;
    if(role==='master'&&o.master!==masterName)return false;
    return (o.created||0)>seen;
  }).length;
}
function markOrdersSeen(){
  if(!role)return;
  var key='orders_seen_'+role+(role==='master'?'_'+masterName:'');
  try{localStorage.setItem(key,Date.now());}catch(e){}
}
function unreadPaymentCount(){
  if(role!=='director'&&role!=='manager')return 0;
  var key='payments_seen';
  var seen=0;try{seen=parseInt(localStorage.getItem(key))||0;}catch(e){}
  var needAdv=orders.filter(function(o){return o.master==='Света'&&['new','nextweek','work'].indexOf(o.status)>=0&&!o.advancePaid&&(o.created||0)>seen;});
  var needPost=orders.filter(function(o){return o.master==='Света'&&(o.status==='ready'||o.status==='planned'||o.status==='done')&&!o.postpayPaid&&(o.created||0)>seen;});
  return needAdv.length+needPost.length;
}
function markPaymentsSeen(){
  try{localStorage.setItem('payments_seen',Date.now());}catch(e){}
}
function selectTaskTo(btn){
  window.taskTo=btn.dataset.to;
  var wrap=btn.parentElement;
  wrap.querySelectorAll('button[data-to]').forEach(function(b){
    var c=b.dataset.color,active=b===btn;
    b.style.background=active?c:(c+'14');
    b.style.color=active?'#fff':c;
  });
}
function taskCard(t){
  const me=myTaskName();
  const isPersonal=t.to===me&&t.from===me;
  const canAct=(role==='manager'||role==='director')||(role==='master'&&t.to===masterName)||(isPersonal);
  const dt=new Date(t.created).toLocaleString('ru',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  var toLabel=t.to==='all'?'Александра и Даша':isPersonal?'Мне':t.to;
  const toColor=personColor(t.to);
  // Чекбокс выполнения (можно снять обратно)
  var check=(canAct&&!isPreviewMode)
    ? '<input type="checkbox" '+(t.done?'checked':'')+' onchange="setTaskDone(\''+t.id+'\',this.checked)" style="width:18px;height:18px;margin-top:1px;accent-color:var(--green);cursor:pointer;flex-shrink:0">'
    : '<span style="width:18px;height:18px;flex-shrink:0;border:1.5px solid var(--border2);border-radius:5px;'+(t.done?'background:var(--green);border-color:var(--green)':'')+'"></span>';
  var del=(role!=='master'&&!isPreviewMode)
    ? '<button style="background:none;border:none;color:#c8a0a0;font-size:18px;padding:0 2px;line-height:1;cursor:pointer;flex-shrink:0" onclick="delTask(\''+t.id+'\')">×</button>':'';
  // Ярлычок исполнителя — компактный, как фильтр-чип
  var chip='<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:'+toColor+'1a;color:'+toColor+';border:1px solid '+toColor+'40;white-space:nowrap">'+toLabel+'</span>';
  return '<div class="card" style="margin-bottom:8px;opacity:'+(t.done?'.6':'1')+'">'
    +'<div style="padding:11px 13px;display:flex;align-items:flex-start;gap:10px">'
    +check
    +'<div style="flex:1;min-width:0">'
    +'<div style="font-size:13px;line-height:1.4;'+(t.done?'text-decoration:line-through;color:var(--text3)':'color:var(--text1)')+'">'+t.text+'</div>'
    +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:6px">'
    +chip
    +'<span style="font-size:10px;color:var(--text3)">от '+t.from+' · '+dt+'</span>'
    +'</div>'
    +'</div>'+del
    +'</div></div>';
}

async function addTask(){
  const text=v('task-text');
  if(!text){toast('Напишите задачу');return;}
  const fromName=myTaskName();
  var to=window.taskTo||(role==='master'?'Даша':'Александра');
  if(to==='Мне') to=fromName; // личные задачи — сохраняем с именем текущего
  const t={id:uid(),from:fromName,to:to,text:text,done:false,created:Date.now()};
  tasks.unshift(t);
  await saveTasks(tasks);
  toast('Задача добавлена');renderTab('todos');
}
async function setTaskDone(id,done){
  const t=tasks.find(function(x){return x.id===id;});
  if(t){t.done=!!done;await saveTasks(tasks);renderTab('todos');}
}
async function doneTask(id){
  const t=tasks.find(function(x){return x.id===id;});
  if(t){t.done=true;await saveTasks(tasks);renderTab('todos');}
}
async function delTask(id){
  tasks=tasks.filter(function(x){return x.id!==id;});
  await saveTasks(tasks);renderTab('todos');
}

function v(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function toggleDrop(id){
  document.querySelectorAll('[id^="drop-"]').forEach(function(el){
    if(el.id!==id)el.style.display='none';
  });
  var el=document.getElementById(id);
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}
function closeAllDrops(){
  document.querySelectorAll('[id^="drop-"]').forEach(function(el){el.style.display='none';});
}
document.addEventListener('click',function(e){
  var dropper=e.target.closest('[data-drop]');
  if(dropper){
    var did=dropper.dataset.drop;
    document.querySelectorAll('[id^="drop-"]').forEach(function(el){
      el.style.display=el.id===did?(el.style.display==='none'?'block':'none'):'none';
    });
    return;
  }
  var item=e.target.closest('[data-act]');
  if(item){
    var act=item.dataset.act,val=item.dataset.val;
    if(act==='status-all'){fStatus='all';}
    else if(act==='urgent'){fUrgent=!fUrgent;}
    else if(act==='status'){fStatus=val;}
    else if(act==='month'){fMonth=val;}
    else if(act==='master'){fMaster=val;}
    else if(act==='sort'){fSort=val;}
    else if(act==='mstatus'){fStatus=val;closeAllDrops();renderTab('master');return;}
    else if(act==='mmonth'){fMonth=val;closeAllDrops();renderTab('master');return;}
    closeAllDrops();
    renderTab('list');
    return;
  }
  if(!e.target.closest('.dropdown'))closeAllDrops();
});

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

// Прокрутка колёсиком/тачпадом над числовым полем НЕ должна менять его значение:
// снимаем фокус с поля, чтобы прокручивалась страница, а не цифры.
document.addEventListener('wheel',function(e){
  var a=document.activeElement;
  if(a&&a.tagName==='INPUT'&&a.type==='number'&&a===e.target){a.blur();}
},{passive:true});

  // Check if already logged in via sessionStorage
  const saved=sessionStorage.getItem('markovka_role');
  if(saved){
    try{
      const ui=JSON.parse(saved);
      login(ui.role,ui.name,ui.label,ui.masterName);
    }catch(e){/* ignore */}
  }
});
